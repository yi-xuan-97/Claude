<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">

<style>

html[data-theme="dark"]{--bg:#17140F;--bg2:#1E1A14;--card:#241F18;--ink:#ECE4D6;--soft:#A99E8C;--line:#352E24;
--clay:#D98A5B;--clay-d:#E0996C;--sage:#93A06B;--green:#7BAE6F;--amber:#D6A24C;--red:#D9704F;--chip:#2A241C;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;
padding-bottom:calc(72px + env(safe-area-inset-bottom))}
.wrap{max-width:820px;margin:0 auto;padding:0 15px}
header{background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--line);padding:16px 0 0;position:sticky;top:0;z-index:30}

.weeksel{display:flex;gap:6px;overflow-x:auto;padding:11px 0 10px;scrollbar-width:none}
.weeksel::-webkit-scrollbar{display:none}
.wk{white-space:nowrap;font-size:.86rem;border:1px solid var(--line);background:var(--card);color:var(--soft);
border-radius:999px;padding:6px 14px;cursor:pointer;font-family:var(--sans);flex:none}
.wk.on{background:var(--clay);color:#fff;border-color:var(--clay);font-weight:600}
a.wk{text-decoration:none;display:inline-flex;align-items:center;color:var(--clay-d);border-style:dashed}
.weeksel.hide{display:none}
#panel{padding:16px 0 10px;animation:f .2s ease}
@keyframes f{from{opacity:0}to{opacity:1}}
h2{font-family:var(--serif);font-size:1.24rem;margin:2px 0 4px}
.wtheme{color:var(--soft);margin:0 0 8px;font-size:.9rem}
.hint{font-size:.84rem;color:var(--clay-d);background:var(--chip);padding:7px 12px;border-radius:10px;margin:8px 0 14px}
.sech{font-family:var(--serif);font-weight:700;font-size:1.05rem;margin:16px 0 8px;color:var(--clay-d)}
h3{font-size:1rem;margin:18px 0 8px;color:var(--clay-d)}
p{margin:8px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin:10px 0}
ul.clean{margin:6px 0;padding-left:18px}ul.clean li{margin:5px 0;font-size:.9rem}
table{width:100%;border-collapse:collapse;font-size:.88rem}th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
th{font-size:.72rem;color:var(--soft);text-transform:uppercase}
.kcal{font-family:var(--mono);color:var(--soft);font-size:.8rem}
.pool{display:grid;grid-template-columns:1fr 1fr;gap:9px}

.poolcard{border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:var(--card);font-size:.86rem}
.poolcard b{color:var(--clay-d)}
.days{display:flex;flex-direction:column;gap:11px}
.day{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px}
.dh{font-family:var(--serif);font-weight:700;color:var(--clay);font-size:1.02rem;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.meal{display:flex;align-items:flex-start;gap:9px;font-size:.9rem;padding:5px 0}
.ml{flex:none;width:26px;height:26px;border-radius:8px;background:var(--chip);color:var(--soft);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600}
.ml-l{background:var(--sage);color:#fff}.ml-d{background:var(--clay);color:#fff}
button.din{width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin:5px 0;cursor:pointer;display:flex;align-items:center;gap:9px;font-family:var(--sans);color:var(--ink)}
button.din:active{transform:scale(.99)}
.dintxt{flex:1;font-weight:600;font-size:.94rem}
.see{flex:none;font-size:.78rem;color:var(--clay);font-weight:600;white-space:nowrap}
.cookgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.cookgrid{grid-template-columns:1fr}}
.cookcard{position:relative;text-align:left;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--clay);
border-radius:13px;padding:14px 15px;cursor:pointer;font-family:var(--sans);color:var(--ink)}
.cookcard.lc{border-left-color:var(--sage)}
.cookcard:active{transform:scale(.99)}
.cn{display:block;font-family:var(--serif);font-weight:700;font-size:1.04rem}
.ct{display:block;font-size:.77rem;color:var(--sage);margin-top:2px}
.fav{position:absolute;right:12px;top:12px;font-size:1.1rem;color:var(--line)}
.fav.on{color:var(--red)}
.shopbar{position:sticky;top:107px;z-index:10;background:var(--bg);padding:8px 0 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pbar{flex:1;min-width:120px;height:10px;background:var(--chip);border-radius:6px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--green);width:0;transition:.25s}
#pcount{font-family:var(--mono);font-size:.8rem;color:var(--soft);white-space:nowrap}
.tog{font-size:.82rem;color:var(--soft);display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
.resetbtn{font-size:.76rem;background:transparent;border:1px solid var(--line);color:var(--soft);border-radius:8px;padding:5px 9px;cursor:pointer}
.shopgrid{columns:2;column-gap:14px}
@media(max-width:600px){.shopgrid{columns:1}}
.shopgroup{break-inside:avoid;margin-bottom:12px}
.shopgroup h5{margin:0 0 5px;font-size:.9rem;color:var(--clay-d)}
ul.shoplist{list-style:none;margin:0;padding:0}
ul.shoplist li.buy{display:flex;gap:11px;align-items:center;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin:6px 0;cursor:pointer;background:var(--card);font-size:.95rem}
ul.shoplist li.buy:active{transform:scale(.99)}
li.buy .box{flex:none;width:22px;height:22px;border:2px solid var(--soft);border-radius:6px;position:relative}
li.buy.done{opacity:.45}li.buy.done .txt{text-decoration:line-through}
li.buy.done .box{background:var(--green);border-color:var(--green)}
li.buy.done .box::after{content:"✓";color:#fff;font-size:15px;position:absolute;left:3px;top:-3px;font-weight:700}
ul.shoplist li.buy.hidden{display:none}
ul.shoplist li.buy .txt{flex:1}
.stbadge{flex:none;font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:999px;color:#fff}
.st-FW{background:#C0392B}.st-TJ{background:#C25E1B}.st-WF{background:#3C7A46}.st-AM{background:#6E59A5}
.stchips{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none}
.stchips::-webkit-scrollbar{display:none}
.stchip{white-space:nowrap;font-size:.78rem;border:1px solid var(--line);background:var(--card);color:var(--soft);border-radius:999px;padding:5px 11px;cursor:pointer;flex:none}
.stchip.on{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:600}
.stlegend{font-size:.75rem;color:var(--soft);margin:0 0 10px;line-height:1.6}
.pchips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:6px 0 4px}
.pchip{font-size:.86rem;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--clay);border-radius:10px;padding:8px 12px;cursor:pointer;font-family:var(--sans);color:var(--ink);font-weight:600}
.pchip.fresh{border-left-color:var(--sage)}.pchip:active{transform:scale(.99)}
.pnote{font-size:.82rem;color:var(--soft);flex-basis:100%;margin-top:2px}
ol.pflow{margin:8px 0 0;padding-left:20px}ol.pflow li{margin:6px 0;font-size:.9rem}
.note{border:1px solid var(--clay);background:rgba(181,100,60,.06);border-radius:12px;padding:12px 15px;margin:12px 0;font-size:.88rem}
.foot2{border-top:1px solid var(--line);margin-top:20px;padding-top:12px;font-size:.82rem;color:var(--soft)}
.bnav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--card);border-top:1px solid var(--line);
display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom));gap:4px}
.nav-btn{flex:1;background:transparent;border:0;color:var(--soft);font-family:var(--sans);font-size:.72rem;
padding:6px 2px;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .ic{font-size:1.25rem;line-height:1}
.nav-btn.on{color:var(--clay);font-weight:700}
.overlay{position:fixed;inset:0;z-index:60;background:var(--bg);transform:translateY(100%);transition:transform .28s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay.open{transform:none}
.ovbar{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top))}
.ovback{background:transparent;border:0;color:var(--clay);font-size:1rem;font-weight:600;cursor:pointer;flex:none;font-family:var(--sans)}
.ovtitle{flex:1;text-align:center;font-family:var(--serif);font-weight:700;font-size:1.1rem}
.ovwake{flex:none;font-size:.78rem;background:var(--card);border:1px solid var(--line);color:var(--soft);border-radius:9px;padding:7px 10px;cursor:pointer}
.ovwake.on{background:var(--amber);color:#fff;border-color:var(--amber)}
.ovbody{max-width:720px;margin:0 auto;padding:16px 16px 60px}
.rtag2{font-family:var(--mono);font-size:.76rem;color:var(--sage);margin-bottom:4px}
.lonote{border:1px solid var(--sage);background:rgba(95,107,73,.09);border-radius:11px;padding:11px 13px;margin:6px 0 10px;font-size:.9rem}
.ingr-list{list-style:none;padding:0;margin:6px 0}
.ingr-list li{display:flex;gap:11px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin:6px 0;background:var(--card);font-size:.98rem;cursor:pointer}
.ingr-list li .cb{flex:none;width:20px;height:20px;border:2px solid var(--soft);border-radius:6px;position:relative}
.ingr-list li.got{opacity:.5}.ingr-list li.got .cb{background:var(--sage);border-color:var(--sage)}
.ingr-list li.got .cb::after{content:"✓";color:#fff;font-size:13px;position:absolute;left:2px;top:-3px;font-weight:700}
.ingr-list li.got span:last-child{text-decoration:line-through}
ol.steps{list-style:none;padding:0;margin:6px 0}
ol.steps li{display:flex;gap:13px;align-items:flex-start;padding:14px 15px;border:1px solid var(--line);border-radius:13px;margin:9px 0;background:var(--card);font-size:1.05rem;line-height:1.6;cursor:pointer}
ol.steps li .sn{flex:none;width:30px;height:30px;border-radius:50%;background:var(--clay);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:.95rem}
ol.steps li.done{opacity:.5}ol.steps li.done .sn{background:var(--green)}
ol.steps li.done span:last-child{text-decoration:line-through}
.favbtn{width:100%;margin-top:18px;padding:14px;border-radius:13px;border:1px solid var(--clay);background:transparent;color:var(--clay);font-size:1rem;font-weight:600;cursor:pointer;font-family:var(--sans)}
.favbtn.on{background:var(--red);border-color:var(--red);color:#fff}

.pickwrap{max-width:640px;margin:0 auto;padding:18px 15px 90px}
.dice{width:100%;padding:20px;border-radius:18px;border:0;background:var(--clay);color:#fff;font-size:1.25rem;
font-family:var(--serif);font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(181,100,60,.28)}
.dice:active{transform:scale(.99)}
.moodrow{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 4px}
.mood{font-size:.88rem;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:8px 14px;cursor:pointer;font-family:var(--sans)}
.mood.on{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:600}
.blah{width:100%;margin-top:14px;padding:14px;border-radius:14px;border:1.5px dashed var(--amber);background:transparent;
color:var(--amber);font-size:1rem;font-weight:600;cursor:pointer;font-family:var(--sans)}
.blahpanel{display:none;border:1px solid var(--amber);background:rgba(185,131,40,.07);border-radius:14px;padding:15px 16px;margin-top:10px;font-size:.92rem}
.blahpanel.show{display:block;animation:f .25s ease}
.blahpanel ol{margin:8px 0 4px;padding-left:20px}.blahpanel li{margin:7px 0}
.soothe{margin-top:10px;width:100%;padding:12px;border-radius:12px;border:0;background:var(--sage);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--sans)}
.result{display:none;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--clay);border-radius:16px;
padding:18px;margin-top:18px;text-align:center}
.result.show{display:block;animation:f .25s ease}
.rname{font-family:var(--serif);font-weight:700;font-size:1.5rem;margin:2px 0}
.rtag{color:var(--sage);font-size:.85rem}
.rsrc{font-family:var(--mono);color:var(--soft);font-size:.76rem;margin-top:6px}
.rbtns{display:flex;gap:9px;margin-top:14px}
.rbtn{flex:1;padding:12px;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--sans)}
.rbtn.see2{border:0;background:var(--clay);color:#fff}
.rbtn.again{border:1px solid var(--line);background:transparent;color:var(--soft)}
.backrow{margin-top:20px;text-align:center;font-size:.86rem}
.backrow a{color:var(--clay-d)}
</style></head><body>
<header><div class="wrap"><div class="htop"><h1>🎲 今天吃什么</h1>
<button class="dk" onclick="tg()">🌗</button></div></div></header>
<div class="pickwrap">
  <p class="wtheme">不知道吃啥？让骰子替你决定——122 道菜里抽一道，都是你菜单里的、放心吃 😋</p>
  <button class="dice" onclick="roll()">🎲 随便给我来一道！</button>
  <div class="moodrow" id="moods"></div>
  <div class="result" id="result">
    <div class="rname" id="rname">…</div>
    <div class="rtag" id="rtag"></div>
    <div class="rsrc" id="rsrc"></div>
    <div class="rbtns">
      <button class="rbtn again" onclick="roll()">🎲 换一道</button>
      <button class="rbtn see2" onclick="openR()">看做法 ›</button>
    </div>
  </div>
  <button class="blah" onclick="blah()">😩 想吃点什么，但什么都不想吃…</button>
  <div class="blahpanel" id="blahpanel">
    <b>这不是你有问题——多半是累了。</b>这种时候别逼自己想菜谱：
    <ol>
      <li><b>零决策：</b>开冰箱拿一盒备餐，微波热透，吃完再说</li>
      <li><b>极简餐：</b>蛋花汤+米饭，或 酸奶+水果+一把坚果——这也算及格的一顿 ✅</li>
      <li><b>不想开火：</b>点外卖，照「说明页·外食小抄」点，一顿外食毁不了一周</li>
      <li><b>或者交给我 ↓</b> 抽一道清淡舒服的，不合胃口就再抽</li>
    </ol>
    <button class="soothe" onclick="soothe()">🍲 抽一道清淡舒服的</button>
    <p style="margin:10px 0 0;color:var(--soft);font-size:.85rem">及格线永远只有三条：有点蛋白、有点菜、没喝甜的。吃完早点休息 💛</p>
  </div>
  <div class="backrow">📅 看整周菜单：<a href="index.html">第1–4周</a> · <a href="week5-8.html">第5–8周</a> · <a href="week9-12.html">第9–12周</a></div>
</div>

function openR(){if(!cur)return;var r=cur;
  var h='<div class="ovbar"><button class="ovback" onclick="closeR()">‹ 返回</button><span class="ovtitle">'+r.name+'</span>'
   +'<button class="ovwake" id="wakebtn" onclick="toggleWake()">🔆 常亮</button></div><div class="ovbody">';
  h+='<div class="rtag2">'+r.tag+' · 第'+r.wk+'周'+r.meal+'</div>';
  h+='<h3>🧺 材料（生重·1人份）</h3><ul class="ingr-list">';
  r.ingrList.forEach(function(it){h+='<li onclick="this.classList.toggle(\'got\')"><span class="cb"></span><span>'+it+'</span></li>'});
  h+='</ul><h3>👩‍🍳 做法（点一步划掉一步）</h3><ol class="steps">';
  r.steps.forEach(function(s,i){h+='<li onclick="this.classList.toggle(\'done\')"><span class="sn">'+(i+1)+'</span><span>'+s+'</span></li>'});
  h+='</ol>';
  var fav=LS.get('fav_'+r.name,'0')==='1';
  h+='<button class="favbtn'+(fav?' on':'')+'" data-n="'+r.name+'" onclick="toggleFav(this)">'+(fav?'♥ 已收藏':'♡ 收藏这道菜')+'</button></div>';
  var ov=$('#overlay');ov.innerHTML=h;ov.classList.add('open');document.body.style.overflow='hidden';}
function closeR(){$('#overlay').classList.remove('open');document.body.style.overflow='';releaseWake();}
function toggleFav(btn){var n=btn.dataset.n,on=LS.get('fav_'+n,'0')!=='1';LS.set('fav_'+n,on?'1':'0');
  btn.classList.toggle('on',on);btn.textContent=on?'♥ 已收藏':'♡ 收藏这道菜';}
var wl=null;
function toggleWake(){var btn=$('#wakebtn');if(wl){releaseWake();return;}
  if(!('wakeLock'in navigator)){btn.textContent='本机不支持';return;}
  navigator.wakeLock.request('screen').then(function(s){wl=s;btn.classList.add('on');btn.textContent='🔆 常亮·开';
    wl.addEventListener('release',function(){btn.classList.remove('on');btn.textContent='🔆 常亮';wl=null;});}).catch(function(){btn.textContent='开启失败';});}
function releaseWake(){if(wl){try{wl.release()}catch(e){}wl=null;}var b=$('#wakebtn');if(b){b.classList.remove('on');b.textContent='🔆 常亮';}}
function tg(){var h=document.documentElement,d=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',d);LS.set('eat_theme',d);}
(function(){var t=LS.get('eat_theme','');if(t)document.documentElement.setAttribute('data-theme',t);})();
drawMoods();
if('serviceWorker'in navigator){window.addEventListener('load',function(){try{navigator.serviceWorker.register('sw.js')}catch(e){}});}
</script></body></html>
