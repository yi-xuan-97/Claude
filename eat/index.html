function week(){for(var i=0;i<DATA.weeks.length;i++){if(DATA.weeks[i].n===curWeek)return DATA.weeks[i]}return DATA.weeks[0]}
function wkByN(n){for(var i=0;i<DATA.weeks.length;i++){if(DATA.weeks[i].n===n)return DATA.weeks[i]}return DATA.weeks[0]}
function renderWeekSel(){
  var box=$('#weeksel');box.innerHTML='';box.className='weeksel'+(curMode==='help'?' hide':'');
  DATA.weeks.forEach(function(w){var b=document.createElement('button');b.className='wk'+(w.n===curWeek?' on':'');
    b.textContent='第'+w.n+'周·'+w.theme;b.onclick=function(){curWeek=w.n;LS.set('eat_week',w.n);render()};box.appendChild(b);});
}
function menuHTML(){
  var w=week(),h='<h2>第'+w.n+'周 · '+w.theme+'</h2><p class="wtheme">'+w.sub+'</p>';
  h+='<p class="hint">👨‍🍳 一周买一次、备餐日一次做好，照着每天吃；点午餐/晚餐看做法。哪些批量做、哪些现做见「🥘备餐」页</p><div class="days">';
  w.days.forEach(function(d){
    h+='<div class="day"><div class="dh">'+d.d+' <span class="kcal">≈1500 大卡·蛋白100–120g</span></div>';
    h+='<div class="meal"><span class="ml">早</span><span>'+d.bf+'</span></div>';
    var lcall = d.lt==='cook' ? "openCook('l',"+d.li+",0)" : "openCook('d',"+d.li+",1)";
    h+='<button class="din" onclick="'+lcall+'"><span class="ml ml-l">午</span><span class="dintxt">'+d.lunchText+'</span><span class="see">看做法 ›</span></button>';
    h+='<button class="din" onclick="openCook(\'d\','+d.dri+',0)"><span class="ml ml-d">晚</span><span class="dintxt">'+d.dinner+'</span><span class="see">看做法 ›</span></button>';
    h+='<div class="meal"><span class="ml">加</span><span>'+d.snack+'</span></div></div>';
  });
  return h+'</div>';
}
function card(coll,i,r){var fav=LS.get('fav_'+r.name,'0')==='1';
  return '<button class="cookcard'+(coll==='l'?' lc':'')+'" onclick="openCook(\''+coll+'\','+i+',0)"><span class="cn">'+r.name+'</span><span class="ct">'+r.tag+'</span><span class="fav'+(fav?' on':'')+'">♥</span></button>';}
function cookHTML(){
  var w=week(),h='<h2>第'+w.n+'周 · 做饭</h2><p class="hint">点一道菜看大字做法；能勾料、勾步骤，还能开「屏幕常亮」🔆</p>';
  h+='<div class="sech">🥗 午餐（现做·快手）</div><div class="cookgrid">';
  w.lunches.forEach(function(r,i){h+=card('l',i,r)});
  h+='</div><div class="sech">🍲 晚餐（招牌）</div><div class="cookgrid">';
  w.dinners.forEach(function(r,i){h+=card('d',i,r)});
  return h+'</div>';
}
var STLAB={FW:'Fareway',TJ:'TJ',WF:'WF',AM:'亚超'};
function chip(code,label){return '<button class="stchip'+(curStore===code?' on':'')+'" data-c="'+code+'" onclick="filterStore(\''+code+'\')">'+label+'</button>';}
function shopHTML(){
  var w=week(),h='<h2>第'+w.n+'周 · 买菜</h2>';
  h+='<div class="shopbar"><div class="pbar"><i id="pfill"></i></div><span id="pcount"></span>'
   +'<label class="tog"><input type="checkbox" id="hb"'+(hideBought?' checked':'')+' onchange="toggleHide()"> 只看没买的</label>'
   +'<button class="resetbtn" onclick="resetShop()">清空</button></div>';
  h+='<div class="stchips">'+chip('all','全部')+chip('FW','Fareway')+chip('TJ',"Trader Joe's")+chip('WF','Whole Foods')+chip('AM','亚超/Yami')+'</div>';
  h+='<div class="stlegend">🏪 <b>Fareway</b>=肉·蛋·常见蔬果 · <b>TJ</b>=罐装鱼·酸奶·坚果·冷冻 · <b>WF</b>=豆腐·豆浆·鲜鱼·香菇 · <b>亚超/Yami</b>=中式菜和酱料（这三家一般没有，网购或亚超）</div>';
  h+='<div class="shopgrid">';
  var idx=0;
  for(var grp in w.shop){h+='<div class="shopgroup"><h5>'+grp+'</h5><ul class="shoplist">';
    w.shop[grp].forEach(function(pair){var it=pair[0],st=pair[1];var key='sl_w'+w.n+'_'+idx;idx++;var done=LS.get(key,'0')==='1';
      h+='<li class="buy'+(done?' done':'')+'" data-key="'+key+'" data-s="'+st+'" onclick="toggleBuy(this)"><span class="box"></span><span class="txt">'+it+'</span><span class="stbadge st-'+st+'">'+STLAB[st]+'</span></li>';});
    h+='</ul></div>';}
  return h+'</div>';
}
function prepHTML(){var w=week();var fresh=w.fresh||[];var batch=[];
  w.dinners.forEach(function(r,i){if(fresh.indexOf(i)<0)batch.push(i)});
  var h='<h2>第'+w.n+'周 · 备餐日 🥘</h2>';
  h+='<p class="hint">你是「一周买一次、做一次」——备餐日花约 1.5–2 小时把耐放的都做好，一周热着吃；不耐放的吃当天几分钟现做。点菜名看做法。</p>';
  h+='<div class="sech">🍚 一次做好这些（批量·分装冷藏/冷冻）</div><div class="pchips">';
  batch.forEach(function(i){h+='<button class="pchip" onclick="openCook(\'d\','+i+',0)">'+w.dinners[i].name+' ›</button>'});
  h+='<span class="pnote">+ 一大锅杂粮饭、烤一盘红薯、焯或快炒一大盘耐放菜（西兰花·彩椒·胡萝卜·豆角）</span></div>';
  h+='<div class="card"><b>备餐日流程</b><ol class="pflow">'
   +'<li>先焖上<b>一大锅杂粮饭</b>（够一周），分小盒冷藏/冷冻</li>'
   +'<li>这周的<b>鸡肉/瘦肉一次腌好</b>，一锅接一锅煎/烤/照烧做完，分装</li>'
   +'<li>炖一锅<b>“硬菜”</b>（上面那些耐放的炖菜/咖喱），当本周主力</li>'
   +'<li>红薯/南瓜烤一盘；耐放蔬菜焯或快炒一大盘</li>'
   +'<li><b>分装贴日期</b>：周一~周四放冷藏，周五~周日放冷冻</li>'
   +'<li>吃前一晚把冷冻的移冷藏解冻；吃时微波<b>热透</b></li></ol></div>';
  h+='<div class="sech">🥬 这几样趁新鲜现做（吃当天几分钟）</div><div class="pchips">';
  fresh.forEach(function(i){h+='<button class="pchip fresh" onclick="openCook(\'d\','+i+',0)">'+w.dinners[i].name+' ›</button>'});
  h+='<span class="pnote">+ 每餐一把<b>绿叶菜</b>焯一下或快炒（青菜久放会蔫、变色）</span></div>';
  h+='<div class="card">🧊 <b>保存 & 加热：</b>熟食冷藏 <b>3–4 天</b>、冷冻 2–3 周。米饭和肉类微波<b>热透</b>再吃；绿叶菜、虾、蒸蛋<b>现做</b>口感最好也更安全，所以别提前做。</div>';
  return h;}
function filterStore(c){curStore=c;LS.set('eat_store',c);document.querySelectorAll('.stchip').forEach(function(b){b.classList.toggle('on',b.dataset.c===c)});applyFilters();updateProg();}
function render(){renderWeekSel();var p=$('#panel');
  if(curMode==='menu')p.innerHTML=menuHTML();
  else if(curMode==='cook')p.innerHTML=cookHTML();
  else if(curMode==='shop'){p.innerHTML=shopHTML();applyFilters();updateProg();}
  else if(curMode==='prep')p.innerHTML=prepHTML();
  else p.innerHTML=DATA.help;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('on',b.dataset.m===curMode)});
  window.scrollTo(0,0);}
function setMode(m){curMode=m;render()}
function toggleBuy(li){li.classList.toggle('done');LS.set(li.dataset.key,li.classList.contains('done')?'1':'0');applyFilters();updateProg();}
function toggleHide(){hideBought=$('#hb').checked;LS.set('eat_hb',hideBought?'1':'0');applyFilters()}
function applyFilters(){document.querySelectorAll('#panel .buy').forEach(function(li){
  var hide=(curStore!=='all'&&li.dataset.s!==curStore)||(hideBought&&li.classList.contains('done'));li.classList.toggle('hidden',hide);})}
function updateProg(){var a=[].slice.call(document.querySelectorAll('#panel .buy')).filter(function(li){return curStore==='all'||li.dataset.s===curStore});
  var t=a.length,n=a.filter(function(li){return li.classList.contains('done')}).length;
  var f=$('#pfill');if(f)f.style.width=(t?Math.round(n/t*100):0)+'%';var c=$('#pcount');if(c)c.textContent='已买 '+n+'/'+t+' · 还剩 '+(t-n);}
function resetShop(){document.querySelectorAll('#panel .buy').forEach(function(li){li.classList.remove('done');LS.del(li.dataset.key)});applyFilters();updateProg();}
function openCook(coll,idx,lo){
  var w=week(),r=coll==='l'?w.lunches[idx]:w.dinners[idx];
  var h='<div class="ovbar"><button class="ovback" onclick="closeCook()">‹ 返回</button><span class="ovtitle">'+r.name+'</span>'
   +'<button class="ovwake" id="wakebtn" onclick="toggleWake()">🔆 常亮</button></div><div class="ovbody">';
  h+='<div class="rtag2">'+r.tag+'</div>';
  if(lo)h+='<div class="lonote">💡 这餐就是把前一晚的《'+r.name+'》<b>多做一份</b>，中午热透就能吃——懒得开火直接热剩的就行 👍</div>';
  h+='<h3>🧺 材料（生重·1人份）</h3><ul class="ingr-list">';
  r.ingrList.forEach(function(it){h+='<li onclick="this.classList.toggle(\'got\')"><span class="cb"></span><span>'+it+'</span></li>'});
  h+='</ul><h3>👩‍🍳 做法（点一步划掉一步）</h3><ol class="steps">';
  r.steps.forEach(function(s,i){h+='<li onclick="this.classList.toggle(\'done\')"><span class="sn">'+(i+1)+'</span><span>'+s+'</span></li>'});
  h+='</ol>';
  var fav=LS.get('fav_'+r.name,'0')==='1';
  h+='<button class="favbtn'+(fav?' on':'')+'" data-n="'+r.name+'" onclick="toggleFav(this)">'+(fav?'♥ 已收藏':'♡ 收藏这道菜')+'</button></div>';
  var ov=$('#overlay');ov.innerHTML=h;ov.classList.add('open');document.body.style.overflow='hidden';}
function closeCook(){$('#overlay').classList.remove('open');document.body.style.overflow='';releaseWake();if(curMode==='cook')render();}
function toggleFav(btn){var n=btn.dataset.n,on=LS.get('fav_'+n,'0')!=='1';LS.set('fav_'+n,on?'1':'0');
  btn.classList.toggle('on',on);btn.textContent=on?'♥ 已收藏':'♡ 收藏这道菜';}
var wl=null;
function toggleWake(){var btn=$('#wakebtn');if(wl){releaseWake();return;}
  if(!('wakeLock'in navigator)){btn.textContent='本机不支持';return;}
  navigator.wakeLock.request('screen').then(function(s){wl=s;btn.classList.add('on');btn.textContent='🔆 常亮·开';
    wl.addEventListener('release',function(){btn.classList.remove('on');btn.textContent='🔆 常亮';wl=null;});}).catch(function(){btn.textContent='开启失败';});}
function releaseWake(){if(wl){try{wl.release()}catch(e){}wl=null;}var b=$('#wakebtn');if(b){b.classList.remove('on');b.textContent='🔆 常亮';}}
document.addEventListener('visibilitychange',function(){if(wl&&document.visibilityState==='visible'){navigator.wakeLock.request('screen').then(function(s){wl=s;}).catch(function(){});}});
function tg(){var h=document.documentElement,d=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',d);LS.set('eat_theme',d);}
(function(){var t=LS.get('eat_theme','');if(t)document.documentElement.setAttribute('data-theme',t);})();
DATA.help = "\n<h2>说明 & 小抄</h2>\n<div class=\"note\">📲 <b>把它装到手机主屏，像 App 一样用：</b><br>\n<b>iPhone（Safari）：</b>打开网页 → 点底部「分享」⬆️ → 「添加到主屏幕」。以后从主屏图标打开就是全屏。<br>\n<b>安卓（Chrome）：</b>右上角「⋮」→「添加到主屏幕 / 安装应用」。<br>\n装好后没网也能看，你的勾选和收藏都会记住。</div>\n<div class=\"note\">🍱 <b>你的节奏：一周买一次、做一次。</b>去「🥘备餐」页看备餐日一次要做好哪些、怎么分装冷藏冷冻，一周热着吃；只有绿叶菜/虾/蒸蛋这类不耐放的，吃当天花几分钟现做。菜单里午餐、晚餐都能点开看做法。</div>\n<h3>🍳 早餐轮换池（每个约 350–450 大卡）</h3><div class=\"pool\"><div class=\"poolcard\"><b>① 燕麦豆浆蛋</b><br>燕麦 + 无糖豆浆 + 水煮蛋×2 + 蓝莓</div><div class=\"poolcard\"><b>② 酸奶燕麦碗</b><br>无糖希腊酸奶 + 燕麦 + 核桃 + 香蕉</div><div class=\"poolcard\"><b>③ 番茄炒蛋馒头</b><br>番茄炒蛋(少油) + 全麦馒头½ + 无糖豆浆</div><div class=\"poolcard\"><b>④ 蔬菜蛋饼</b><br>胡萝卜木耳蔬菜鸡蛋饼(少油) + 无糖豆浆</div><div class=\"poolcard\"><b>⑤ 瘦肉粥</b><br>瘦肉香菇糙米粥 + 水煮蛋 + 凉拌黄瓜</div><div class=\"poolcard\"><b>⑥ 牛奶燕麦</b><br>牛奶燕麦碗 + 水煮蛋 + 苹果</div></div>\n<h3>🍎 加餐随便选</h3><div class=\"card\">无糖希腊酸奶 · 毛豆一把 · 黄瓜/胡萝卜条 · 苹果+几颗核桃 · 无糖豆浆 · 小番茄（任选一样）</div>\n<h3>🥢 选材 & 好吃的原则</h3><div class=\"card\"><ul class=\"clean\">\n<li><b>蛋白管饱：</b>每餐一掌心（鸡胸/鱼/虾/豆腐/蛋/瘦肉）</li>\n<li><b>菜要多：</b>每餐一大盘，颜色越多越好</li>\n<li><b>主食换粗：</b>糙米/燕麦/红薯/玉米 代替一部分白米白面</li>\n<li><b>少油少糖少炸：</b>每餐油约 1 茶匙，多用蒸/炖/白灼/快炒</li>\n<li><b>好吃诀窍：</b>靠蒜姜葱、生抽蚝油、醋、辣、香料提味 😋</li></ul></div>\n<h3>👩‍🍳 备餐省时省钱</h3><div class=\"card\"><ul class=\"clean\">\n<li>周末煮一大锅糙米/杂粮饭，分装冷冻，微波即热</li>\n<li>晚餐<b>多做一份</b>，第二天当午餐便当（就是「备餐·」）</li>\n<li>鸡胸提前用生抽+料酒+少许淀粉腌，炒出来才嫩</li>\n<li>冷冻虾仁、龙利鱼、冷冻杂蔬常备，随时能开火</li></ul></div>\n<h3>⚖️ 「蛋白质克数」怎么算、生称还是熟称</h3><div class=\"card\">\n<p>「蛋白 100–120g」是<b>蛋白质这个营养素</b>的克数，<b>不是</b>肉的重量。食谱分量都按<b>生重</b>标（下锅前称）；肉煮熟缩水约 ¼，但蛋白质总量几乎不变。</p>\n<table><tr><th>常见食材（生重100g）</th><th>约含蛋白</th></tr>\n<tr><td>鸡胸肉</td><td class=\"kcal\">≈ 23g</td></tr><tr><td>虾 / 鱼</td><td class=\"kcal\">≈ 20g</td></tr>\n<tr><td>瘦牛/猪</td><td class=\"kcal\">≈ 20g</td></tr><tr><td>老豆腐</td><td class=\"kcal\">≈ 8g</td></tr>\n<tr><td>鸡蛋 1个</td><td class=\"kcal\">≈ 6–7g</td></tr><tr><td>无糖希腊酸奶 100g</td><td class=\"kcal\">≈ 9–10g</td></tr></table></div>\n<div class=\"foot2\"><p>这页只管吃 😋。运动、复查这些我们另外聊；有重要的身体决定记得找医生。4 周菜单轮换 · 想要第 5–8 周新花样随时说。</p></div>\n";
render();
if('serviceWorker'in navigator){window.addEventListener('load',function(){try{navigator.serviceWorker.register('sw.js')}catch(e){}});}
