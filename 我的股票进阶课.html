<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的股票进阶课 · 4周深度基本面分析</title>
<style>
  :root{
    --bg1:#4338ca; --bg2:#312e81; --accent:#f59e0b; --accent2:#7c3aed;
    --ink:#1f2937; --soft:#6b7280; --card:#ffffff; --line:#e5e7eb;
    --good:#16a34a; --bad:#dc2626; --goodbg:#dcfce7; --badbg:#fee2e2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,#eef2ff 0%,#faf5ff 50%,#fffbeb 100%);
    min-height:100vh; line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px}

  /* ---------- HOME ---------- */
  .hero{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#fff;border-radius:24px;padding:30px 26px;
    box-shadow:0 12px 30px rgba(67,56,202,.25);position:relative;overflow:hidden;
  }
  .hero h1{font-size:26px;font-weight:800;letter-spacing:.5px}
  .hero p{opacity:.92;margin-top:8px;font-size:15px}
  .hero .spark{position:absolute;right:-10px;top:-10px;font-size:120px;opacity:.12}
  .pbar{margin-top:20px;background:rgba(255,255,255,.25);border-radius:99px;height:14px;overflow:hidden}
  .pfill{height:100%;background:linear-gradient(90deg,var(--accent),#fbbf24);border-radius:99px;transition:width .5s ease}
  .pmeta{display:flex;justify-content:space-between;margin-top:8px;font-size:13px;opacity:.92}
  .btn{
    display:inline-block;border:none;cursor:pointer;font-family:inherit;
    background:var(--accent);color:#1f2937;font-weight:700;font-size:16px;
    padding:14px 22px;border-radius:14px;margin-top:18px;transition:transform .1s, box-shadow .2s;
    box-shadow:0 6px 14px rgba(245,158,11,.35);
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 9px 20px rgba(245,158,11,.45)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--bg1);box-shadow:0 4px 12px rgba(0,0,0,.08)}

  .week{margin-top:26px}
  .week h2{font-size:17px;color:var(--bg2);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .week .sub{font-size:13px;color:var(--soft);margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .chip{
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;
    cursor:pointer;transition:transform .12s,box-shadow .2s,border-color .2s;position:relative;
  }
  .chip:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.08);border-color:var(--accent2)}
  .chip .d{font-size:12px;color:var(--soft);font-weight:600}
  .chip .t{font-size:14px;font-weight:600;margin-top:3px;line-height:1.4}
  .chip .em{font-size:22px}
  .chip.done{border-color:var(--accent2);background:linear-gradient(180deg,#faf5ff,#fff)}
  .chip.done .check{position:absolute;top:10px;right:12px;color:var(--good);font-weight:800}
  .chip.current{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.18)}
  .chip.exam{background:linear-gradient(180deg,#fffbeb,#fff)}
  .chip.exam .d{color:#b45309}

  /* ---------- LESSON ---------- */
  .lesson{background:var(--card);border-radius:24px;padding:0;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.08)}
  .lhead{background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;padding:24px 26px}
  .lhead .tag{font-size:13px;opacity:.9;font-weight:600}
  .lhead h2{font-size:23px;margin-top:6px;font-weight:800}
  .lhead .em{font-size:40px;float:right;margin-top:-6px}
  .lbody{padding:24px 26px}
  .lbody p{margin-bottom:14px;font-size:16px}
  .lbody p b{color:var(--bg1)}
  .block{border-radius:16px;padding:16px 18px;margin:18px 0}
  .analogy{background:#fffbeb;border:1px solid #fde68a}
  .analogy .h{font-weight:700;color:#b45309;font-size:14px;margin-bottom:6px}
  .tip{background:#ecfdf5;border:1px solid #a7f3d0}
  .tip .h{font-weight:700;color:#047857;font-size:14px;margin-bottom:4px}
  .hw{background:#eff6ff;border:1px solid #bfdbfe}
  .hw .h{font-weight:700;color:#1d4ed8;font-size:14px;margin-bottom:4px}
  .real{background:#f5f3ff;border:1px solid #ddd6fe}
  .real .h{font-weight:700;color:#6d28d9;font-size:14px;margin-bottom:4px}

  /* quiz */
  .quiz{margin-top:20px;border-top:2px dashed var(--line);padding-top:18px}
  .quiz .qhead{font-weight:800;font-size:16px;margin-bottom:6px;color:var(--bg2)}
  .score{display:inline-block;background:#fef3c7;color:#92400e;font-weight:700;font-size:13px;padding:5px 12px;border-radius:99px;margin-bottom:12px}
  .score.done{background:var(--goodbg);color:#166534}
  .qitem{margin-bottom:18px}
  .qitem .q{font-weight:700;font-size:15.5px;margin-bottom:10px}
  .opt{
    display:block;width:100%;text-align:left;font-family:inherit;font-size:15px;
    background:#f9fafb;border:1.5px solid var(--line);border-radius:12px;padding:13px 16px;
    margin-bottom:10px;cursor:pointer;transition:.15s;
  }
  .opt:hover{border-color:var(--accent2);background:#fff}
  .opt.correct{background:var(--goodbg);border-color:var(--good);font-weight:600}
  .opt.wrong{background:var(--badbg);border-color:var(--bad)}
  .opt:disabled{cursor:default}
  .explain{display:none;margin-top:8px;border-radius:12px;padding:12px 16px;font-size:14.5px;background:var(--goodbg);border:1px solid var(--good)}
  .explain.show{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* widgets */
  .widget{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:18px;margin:18px 0}
  .widget h4{font-size:15px;color:var(--bg1);margin-bottom:12px}
  .field{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .field label{font-size:14px;min-width:110px;color:var(--soft)}
  .field input[type=number]{flex:1;min-width:90px;font-family:inherit;font-size:15px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px}
  .field input[type=range]{flex:1;min-width:120px;accent-color:var(--accent2)}
  .field textarea{flex:1;min-width:200px;font-family:inherit;font-size:14.5px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;resize:vertical}
  .rng-val{font-weight:700;color:var(--bg1);min-width:70px;text-align:right}
  .out{margin-top:8px;background:#fff;border:1px dashed var(--accent2);border-radius:12px;padding:14px;font-size:15px}
  .out .big{font-size:26px;font-weight:800;color:var(--accent2)}
  .seg{display:inline-flex;background:#eef2f7;border-radius:10px;padding:4px;gap:4px;flex-wrap:wrap}
  .seg button{border:none;background:transparent;font-family:inherit;font-size:14px;padding:8px 16px;border-radius:8px;cursor:pointer;color:var(--soft);font-weight:600}
  .seg button.on{background:#fff;color:var(--bg1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .wfall{display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:16px;padding:0 4px}
  .wfall .bar{flex:1;border-radius:8px 8px 0 0;min-height:4px;position:relative;transition:height .4s ease}
  .wfall .bar span{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--soft);white-space:nowrap;font-weight:600}
  .wfall-x{display:flex;gap:10px;font-size:11.5px;color:var(--soft);text-align:center;margin-top:6px}
  .wfall-x span{flex:1}
  .pill{display:inline-block;font-size:13px;font-weight:700;padding:4px 12px;border-radius:99px;margin:2px 4px 2px 0}
  .pill.g{background:var(--goodbg);color:#166534}
  .pill.r{background:var(--badbg);color:#991b1b}
  .pill.y{background:#fef3c7;color:#92400e}
  .sortbtn{display:inline-block;font-family:inherit;font-size:14px;font-weight:600;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;margin:0 8px 8px 0;cursor:pointer;transition:.15s}
  .sortbtn:hover{border-color:var(--accent2)}
  .sortbtn:disabled{cursor:default;opacity:.95}
  .sortbtn.ok{background:var(--goodbg);border-color:var(--good)}
  .sortbtn.no{background:var(--badbg);border-color:var(--bad)}

  .lfoot{padding:20px 26px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .backlink{background:none;border:none;color:var(--soft);font-family:inherit;font-size:15px;cursor:pointer;padding:8px}
  .backlink:hover{color:var(--bg1)}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120px);
    background:var(--bg2);color:#fff;padding:14px 24px;border-radius:14px;font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,.25);transition:transform .4s cubic-bezier(.2,1.3,.4,1);z-index:50;max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .foot-note{text-align:center;color:var(--soft);font-size:12px;margin-top:30px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ 课程数据 ============ */
const WEEKS = {
  1:{t:"第一周 · 读懂财报三大表", s:"利润表、资产负债表、现金流量表——公司的体检报告"},
  2:{t:"第二周 · 关键指标体检", s:"用利润率、ROE、负债率、自由现金流给公司打分"},
  3:{t:"第三周 · 估值:它到底值多少钱", s:"从P/E到PEG再到DCF,自己算出一家公司的价值"},
  4:{t:"第四周 · 像分析师一样思考", s:"护城河、行业、管理层,完整分析一家公司并写下论文"},
  5:{t:"🎁 彩蛋课 · 财报季实战", s:"听懂一场Earnings Call,看懂beat/miss和盘后大涨大跌"}
};

const LESSONS = [
{d:1,wk:1,em:"🩺",title:"财报是公司的体检报告",
 real:`巴菲特说过,他每天的工作主要就是<b>阅读</b>——大量的年报和财报。他买苹果之前,读的不是新闻标题,而是苹果的10-K。在美国,所有上市公司都被SEC(证监会)强制要求公开财报,任何人都能免费看——你和华尔街分析师看到的是<b>同一份文件</b>,这是散户少有的公平起跑线。`,
 body:[`欢迎回来!入门课你学会了"怎么买",进阶课我们解决一个更值钱的问题:<b>怎么判断一家公司好不好、贵不贵</b>。这套本事叫<b>基本面分析(Fundamental Analysis)</b>,核心就是读懂财报。`,
 `先认识三份关键文件:<b>10-K</b>是年报(一年一次,最全面),<b>10-Q</b>是季报(一季度一次,简版),<b>8-K</b>是重大事件公告(随时发)。它们都能在SEC的<b>EDGAR</b>网站或公司官网的"Investor Relations"页面免费下载,Fidelity的个股页面里也有。`,
 `财报的核心是<b>三张表</b>:利润表(赚不赚钱)、资产负债表(家底厚不厚)、现金流量表(现金流转健不健康)。接下来一周,我们一张一张拆开看。`],
 analogy:`财报就像体检报告:利润表是"今年的运动成绩",资产负债表是"身体底子",现金流量表是"血液循环"。只看股价买股票,就像只看长相就结婚——体检报告都不翻一下,风险全靠运气。`,
 tip:`10-K=年报,10-Q=季报,8-K=临时公告;三大表=利润表+资产负债表+现金流量表。全部免费公开。`,
 qs:[{q:"想看一家美国上市公司最全面的年度信息,应该找哪份文件?",opts:["8-K","10-K","新闻稿"],a:1,
   ex:`✅ 对!10-K是年报,内容最全:业务介绍、风险因素、三大报表、管理层讨论都在里面。10-Q是季报简版,8-K只是临时重大事件公告。`}],
 hw:`打开 <b>sec.gov/cgi-bin/browse-edgar</b>(或直接Google "Apple 10-K"),找到苹果最新的10-K,<b>只看目录页</b>,感受一下它有哪些章节。不用读内容!`},

{d:2,wk:1,em:"💰",title:"利润表(上):从营收到毛利",
 real:`苹果2024财年营收约<b>3910亿美元</b>,毛利率约<b>46%</b>——每卖100块钱的东西,刨掉制造成本还剩46块。而开市客(Costco)毛利率只有<b>12%左右</b>,但人家靠"薄利多销+会员费"照样是超级好生意。毛利率高低没有绝对好坏,要看<b>生意模式</b>。`,
 body:[`利润表(Income Statement)讲的是一个故事:<b>一段时间内,公司收进来多少钱,花掉多少,最后剩多少</b>。它像一条瀑布,从最上面的营收一路往下流。`,
 `最上面是<b>营收(Revenue)</b>,也叫Sales或Top Line——卖产品/服务收到的总钱数。往下减去<b>销售成本(COGS)</b>——做出这些产品直接花的钱(原料、工厂、物流)。剩下的叫<b>毛利(Gross Profit)</b>。`,
 `<b>毛利率 = 毛利 ÷ 营收</b>。它回答一个问题:这家公司的产品本身<b>有多能赚</b>?软件公司毛利率常常80%以上(复制一份软件几乎零成本),超市常常只有百分之十几(进货贵、加价少)。`],
 analogy:`你开奶茶店:一个月卖了3万(营收),奶茶原料、杯子、吸管花了1万(COGS),毛利就是2万,毛利率67%。注意——房租和员工工资还没扣呢!那是明天的内容。毛利只回答"奶茶本身赚不赚",不回答"这家店赚不赚"。`,
 tip:`营收-销售成本=毛利;毛利率看"产品本身能不能赚钱",不同行业差异巨大,要和同行比。`,
 qs:[{q:"一家公司营收$200亿,销售成本(COGS)$120亿,它的毛利率是?",opts:["60%","40%","表里查不出来"],a:1,
   ex:`✅ 对!毛利=200-120=$80亿,毛利率=80÷200=40%。这个数字本身不算高也不算低——拿去和同行业对手比,才有意义。`}],
 hw:`在 <b>macrotrends.net</b> 搜你研究的那家公司(入门课选的那只),找到它的 Gross Margin(毛利率),看看最近3年是<b>变高了还是变低了</b>。变高通常是好迹象。`},

{d:3,wk:1,em:"🧾",title:"利润表(下):从毛利到净利",
 real:`两个极端:<b>英伟达(NVDA)</b>2025财年净利率超过<b>50%</b>——每收100块,一半多是纯利润,这是垄断级生意才有的数字;<b>沃尔玛(WMT)</b>净利率常年只有<b>2%~3%</b>,靠巨大的量取胜。把这两家的P/E直接放一起比,就像拿短跑和马拉松比配速——先看懂生意,再看数字。`,
 body:[`接着昨天的瀑布往下流。毛利还要减去<b>运营费用(Operating Expenses)</b>:研发(R&D)、销售与管理费用(SG&A)——这些是"维持公司运转"的钱。减完剩下<b>营业利润(Operating Income)</b>,它衡量<b>主业</b>到底赚不赚钱。`,
 `再减去利息和税,最后剩下的就是<b>净利润(Net Income)</b>,俗称Bottom Line(因为在表的最底行)。净利润÷总股数=<b>每股盈利EPS</b>——这就是你入门课学的P/E里那个"E"的来源!`,
 `三个利润率从上到下:毛利率→营业利润率→净利率,每一层都在回答不同的问题:产品能赚吗?→主业能赚吗?→最后到手多少?`],
 analogy:`还是你的奶茶店:毛利2万,减房租+员工工资1.2万(运营费用),营业利润8千;再交税2千,净利润6千。营收3万最后到手6千,净利率20%——这才是"这家店赚不赚钱"的最终答案。`,
 tip:`瀑布全图:营收→(减COGS)毛利→(减运营费用)营业利润→(减利息和税)净利润。净利润÷股数=EPS。`,
 widget:"waterfall",
 qs:[{q:"公司A毛利率高达70%,但净利率只有2%,最可能说明什么?",opts:["这是好事,说明产品超能赚","中间的运营费用(研发/销售/管理)烧得太凶","利润表算错了"],a:1,
   ex:`✅ 对!产品本身很赚(毛利高),但钱在中间被运营开销吃掉了——常见于疯狂烧钱抢市场的公司。瀑布从哪一层开始"漏水",就去查哪一层。`}],
 hw:`用上面的瀑布计算器,输入你研究的公司的真实数字(macrotrends能查到),看看它的利润瀑布在<b>哪一层漏水最多</b>。`},

{d:4,wk:1,em:"🏦",title:"资产负债表:公司的家底",
 real:`苹果账上常年趴着几百亿美元的现金和投资,这让它在任何危机里都"饿不死";反例是2008年的雷曼兄弟——资产看着庞大,但借的钱是自有资本的<b>30多倍</b>,市场一抖,瞬间资不抵债破产。<b>家底厚不厚,危机时就是生死线。</b>`,
 body:[`利润表看"一段时间",资产负债表(Balance Sheet)看"<b>某一天的快照</b>":这一天,公司有什么、欠什么、真正属于股东的还剩什么。`,
 `一个永远成立的等式:<b>资产 = 负债 + 股东权益</b>(Assets = Liabilities + Equity)。资产是公司拥有的一切(现金、库存、厂房、专利);负债是欠别人的(贷款、应付账款);两者相减,剩下的才是<b>股东权益(Equity)</b>——真正属于你们股东的部分。`,
 `重点看三样:<b>现金</b>多不多(抗风险能力)、<b>债务</b>重不重(会不会被利息压垮)、<b>股东权益</b>是不是在逐年变厚(公司在为股东积累财富)。`],
 analogy:`像你自己的家底:房子+车+存款=资产50万;房贷+车贷=负债30万;真正属于你的净资产=20万。公司也一样——资产大不等于有钱,要减掉欠的,剩下的才算数。`,
 tip:`资产=负债+股东权益,永远成立。看三样:现金厚度、债务重量、股东权益是否逐年增长。`,
 widget:"balance",
 qs:[{q:"一家公司总资产$500亿,总负债$420亿,股东权益是多少?",opts:["$500亿","$80亿","$920亿"],a:1,
   ex:`✅ 对!500-420=$80亿。这家公司84%的资产是靠借来的钱撑着的——杠杆相当高,顺风时赚得快,逆风时也可能被债压垮。`}],
 hw:`查一下你研究的公司,它账上的<b>现金(Cash & Equivalents)</b>和<b>总债务(Total Debt)</b>哪个多?现金比债多的公司,睡觉都安稳些。`},

{d:5,wk:1,em:"💵",title:"现金流量表:利润是观点,现金是事实",
 real:`亚马逊2012-2014年净利润几乎为零甚至亏损,媒体年年唱衰,但它的<b>经营现金流一直强劲为正</b>——钱哗哗进来,只是全砸进了扩张里。看懂现金流的人拿住了,赚了几十倍。反过来,有些公司"账面利润"漂亮,现金却年年流出——那种利润,多半是纸糊的。`,
 body:[`为什么有了利润表还需要现金流量表(Cash Flow Statement)?因为<b>利润是"算"出来的,现金是"数"出来的</b>。比如你赊账卖货100万,利润表立刻记收入,但现金一分没到手。利润可以被会计手法"修饰",现金骗不了人。`,
 `现金流量表分三段:<b>经营现金流(Operating)</b>——主业实际收进来的现金,最重要;<b>投资现金流(Investing)</b>——买设备、建厂、收购花的钱,通常为负(花钱发展);<b>筹资现金流(Financing)</b>——借钱、还债、分红、回购股票。`,
 `健康的成熟公司长这样:经营现金流<b>大额为正</b>,投资现金流为负(持续投入),筹资现金流为负(还债+分红+回购,把钱还给股东)。`],
 analogy:`利润表像你"应得的工资条",现金流量表像你"银行账户的实际流水"。老板说"这个月工资先欠着"——工资条好看,银行卡空空。过日子,最后还是得看卡里有没有钱。`,
 tip:`利润是观点,现金是事实。经营现金流长期为正且大于净利润,是公司健康的硬指标。`,
 widget:"cashsort",
 qs:[{q:"一家公司连续3年净利润为正,但经营现金流都是负的,你应该?",opts:["放心买,利润是正的就行","高度警惕:赚的是'纸面利润',现金一直在流出","只看股价走势就行"],a:1,
   ex:`✅ 对!利润为正、现金为负,说明"赚到的钱"收不回来(比如大量赊账)或者利润本身有水分——这是财报分析里最经典的危险信号之一。`}],
 hw:`查你研究的公司:它的<b>经营现金流(Operating Cash Flow)</b>和<b>净利润(Net Income)</b>哪个大?经营现金流≥净利润,通常是利润"含金量"高的表现。`},

{d:6,wk:1,em:"🚩",title:"财报红旗:怎么发现公司在化妆",
 real:`<b>瑞幸咖啡</b>2020年被揭穿虚构了约<b>3亿美元</b>销售额,股价一天暴跌约75%,随后被纳斯达克摘牌,赔了1.8亿美元罚款。而更早的<b>安然(Enron)</b>用复杂的表外手法藏债务,2001年从明星公司直接破产清零。教训一样:<b>当数字好得不像真的,它往往就不是真的。</b>`,
 body:[`绝大多数公司是诚实的,但你得会认几面"红旗"🚩,保护自己的钱:`,
 `<b>红旗1:应收账款涨得比营收快得多</b>——货"卖"出去了,钱总收不回来,可能在塞货冲业绩。<b>红旗2:利润年年漂亮,经营现金流却常年疲软</b>(昨天刚学过)。<b>红旗3:频繁出现"一次性"项目</b>——年年都有"一次性"费用,那就不叫一次性了。`,
 `<b>红旗4:换审计师、推迟发财报、高管密集离职</b>——厨房着火,厨师先跑。<b>红旗5:故事太完美,增长太丝滑</b>——真实的生意有起伏,完美的曲线往往是画出来的。遇到红旗不一定要立刻判死刑,但一定要<b>降低仓位、提高警惕、去找答案</b>。`],
 analogy:`像相亲对象:收入说得天花乱坠(利润表好看),但你从没见过他的银行流水(现金流);问起细节就含糊其辞(财报附注藏猫腻);介绍人都悄悄换了三轮(审计师离职)……红旗多了,再帅也得跑。`,
 tip:`五面红旗:应收涨过营收、利润强现金弱、年年"一次性"、审计师/高管异动、增长完美得不真实。`,
 qs:[{q:"以下哪种情况最值得警惕?",opts:["营收增长20%,应收账款增长18%","营收增长20%,应收账款增长90%","营收和应收都没怎么增长"],a:1,
   ex:`✅ 对!应收账款(别人欠的货款)增速远超营收,说明"销售"大量是赊出去的、钱收不回来——瑞幸式造假和塞货冲业绩,常常先在这里露马脚。`}],
 hw:`Google一下 <b>"Luckin Coffee fraud 2020"</b>,花5分钟读读这个案子——用真实案例把今天的5面红旗在脑子里过一遍。`},

{d:7,wk:1,em:"📝",title:"第一周 · 周考",
 body:[`第一周完成!三大报表你已经都见过了。来检验一下——错了没关系,点开解释看懂它,比答对更重要。`],
 analogy:`三表一句话:利润表=成绩单(一段时间赚了多少),资产负债表=家底快照(这一刻有什么欠什么),现金流量表=银行流水(现金真实进出)。`,
 tip:`三表要连着看:利润可以化妆,现金很难造假,家底决定抗打击能力。`,
 qs:[
  {q:"想看公司最全面的年度报告,应该找?",opts:["10-Q","8-K","10-K"],a:2,ex:`✅ 10-K是年报,最全面。10-Q是季报,8-K是临时公告。`},
  {q:"营收$100亿,COGS$40亿,运营费用$30亿,利息和税$10亿。营业利润是?",opts:["$60亿","$30亿","$20亿"],a:1,ex:`✅ 毛利=100-40=60亿;营业利润=60-30=30亿;净利润=30-10=20亿。瀑布一层层往下流。`},
  {q:"资产=负债+股东权益,这个等式?",opts:["只在公司赚钱时成立","永远成立","只在年报里成立"],a:1,ex:`✅ 这是会计的根基,任何时刻都成立。资产负债表(Balance Sheet)的"Balance"就是"平衡"的意思。`},
  {q:"'利润是观点,现金是事实'的意思是?",opts:["利润不重要","利润可被会计处理修饰,现金流更难造假","现金流量表是唯一要看的表"],a:1,ex:`✅ 两张表都要看,但当利润和现金"打架"时,优先相信现金。`},
  {q:"下面哪个不算典型的财报红旗?",opts:["应收账款增速远超营收","公司连续多年研发投入稳定增长","年年都有'一次性'大额费用"],a:1,ex:`✅ 持续稳定的研发投入是好事(尤其科技公司)。另外两个都是经典红旗。`},
  {q:"健康的成熟公司,现金流量表通常长什么样?",opts:["经营+,投资-,筹资-","经营-,投资+,筹资+","三段都必须为正"],a:0,ex:`✅ 主业大把收现金(经营+),持续投入发展(投资-),还债分红回购把钱还给股东(筹资-)。三段全正反而奇怪——说明它在借钱+变卖资产。`}],
 hw:`给自己鼓个掌👏。明天开始第二周:把三张表浓缩成几个关键指标,30秒给一家公司"体检"。`},
{d:8,wk:2,em:"📐",title:"盈利能力三兄弟:毛利率/营业利润率/净利率",
 real:`同样是零售,<b>Costco</b>毛利率约12%、净利率不到3%,却是几十年的大牛股——因为它故意把价格压到最低换取顾客忠诚,真正的利润大头来自<b>会员费</b>;而<b>英伟达</b>毛利率70%+、净利率50%+,靠的是别人造不出来的芯片。利润率没有标准答案,<b>和生意模式对上号</b>才是会看。`,
 body:[`第二周开始!上周学的三张表信息量很大,这周我们把它们<b>浓缩成几个数字</b>,像体检指标一样,扫一眼就知道公司健不健康。`,
 `先复习三个利润率,这次重点是<b>怎么用</b>:① 同一家公司<b>和自己的过去比</b>——利润率逐年提升=生意越做越顺;持续下滑=竞争恶化或成本失控。② <b>和同行比</b>——谁能用同样的营收剩下更多钱,谁的本事大。`,
 `千万别跨行业硬比:软件比超市毛利率高是天经地义,不代表软件公司更值得买。<b>先问"这是什么生意",再问"这个数字正常吗"。</b>`],
 analogy:`百米运动员和马拉松选手的配速没法直接比,但每个人"和自己上个赛季比"进步还是退步,一目了然。利润率也是:跨行业比是外行,和自己、和同行比才是内行。`,
 tip:`三个利润率,两种用法:和自己的历史比(趋势),和同行比(竞争力)。跨行业硬比=外行。`,
 widget:"margin",
 qs:[{q:"公司净利率从15%连续三年降到8%,但营收在涨,最合理的解读是?",opts:["营收在涨就没问题","赚钱效率在恶化:可能在打价格战或成本失控,要查原因","净利率不重要"],a:1,
   ex:`✅ 对!"增收不增利"是经典警讯——规模变大但每一块钱越赚越薄。要去查:是行业都这样,还是只有它这样?`}],
 hw:`用上面的对比器看看四家真实公司的利润率差距,然后查一下你研究的公司净利率,在心里给它找个"同类"。`},

{d:9,wk:2,em:"🔁",title:"ROE与杜邦分析:赚钱效率的总开关",
 real:`巴菲特说他最看重的指标之一就是<b>ROE</b>。可口可乐、苹果这类他的爱股,ROE长期在30%以上。不过小心:苹果因为大量回购把股东权益"缩小"了,ROE被推到100%以上——所以ROE超高时,要拆开看是<b>真能赚</b>,还是<b>杠杆/回购把分母变小了</b>。怎么拆?就用今天的杜邦分析。`,
 body:[`<b>ROE(净资产收益率)= 净利润 ÷ 股东权益</b>。意思是:股东投在公司里的每100块钱,一年能赚回多少。ROE 15%以上算优秀,长期20%+是顶级好生意。`,
 `<b>杜邦分析(DuPont Analysis)</b>把ROE拆成三个零件相乘:<b>ROE = 净利率 × 资产周转率 × 杠杆倍数</b>。翻译成人话:赚钱效率 = 每单赚得厚不厚 × 资产转得快不快 × 借了多少倍的钱。`,
 `三种高ROE路线:奢侈品/软件走"高净利率"路线;Costco/沃尔玛走"高周转"路线(每单赚得薄,但转得飞快);银行走"高杠杆"路线。<b>前两种是真本事,靠杠杆撑起来的ROE最脆弱</b>——2008年的雷曼就是杠杆型ROE的下场。`],
 analogy:`三家餐馆都年赚20万:米其林靠一桌赚1000(高净利率);快餐店靠翻台100次(高周转);第三家靠借钱开了10家分店(高杠杆)。生意都成立,但遇到萧条,欠一屁股债的那家最先倒。`,
 tip:`ROE=股东的钱的赚钱效率;杜邦拆解=净利率×周转×杠杆。看到高ROE,先问:靠本事还是靠借钱?`,
 widget:"dupont",
 qs:[{q:"两家公司ROE都是18%:A=净利率12%×周转1.0×杠杆1.5;B=净利率3%×周转1.0×杠杆6。谁更让人放心?",opts:["A:靠净利率,杠杆低","B:杠杆高说明胆子大,赚得多","完全一样,ROE相同就行"],a:0,
   ex:`✅ 对!同样的ROE,A靠产品赚钱、几乎没借钱;B是借了6倍的钱硬撑出来的——利率一涨或生意一抖,B先出事。杜邦分析就是用来识破这个的。`}],
 hw:`用上面的杜邦滑块,先调出"苹果型"(高净利率),再调出"Costco型"(高周转),感受两条路线怎么殊途同归。`},

{d:10,wk:2,em:"⚖️",title:"负债与安全:这家公司会不会倒",
 real:`2020年疫情,航空公司收入归零,带着重债的公司瞬间命悬一线,美国政府不出手就是成片破产;同一时刻,账上现金充裕的苹果、谷歌反而趁机回购自家打折的股票。<b>同样的风暴,家底不同,命运相反。</b>`,
 body:[`公司"会不会赚钱"重要,"会不会死"更重要。三个保命指标:`,
 `<b>① 负债/股东权益(D/E)</b>:借的钱是自有本钱的几倍。大于2就偏高(资本密集行业除外)。<b>② 流动比率(Current Ratio)</b>=流动资产÷流动负债:一年内要还的钱,手头的钱够不够还。大于1.5比较舒服,小于1要警惕。<b>③ 利息覆盖倍数</b>=营业利润÷利息支出:赚的钱够付几次利息。大于5很安全,小于2很危险。`,
 `记住:<b>债务在顺风时是油门,在逆风时是绞索</b>。买之前看一眼债务,就像上车先看一眼油表和刹车。`],
 analogy:`两个人都月入1万:一个房贷月供2千,一个月供9千。平时看不出差别,一旦失业三个月——第一个紧一紧裤腰带,第二个直接断供。公司也一样,看的就是"逆风能撑多久"。`,
 tip:`三个保命数:D/E<2、流动比率>1.5、利息覆盖>5(经验值,资本密集行业放宽)。债务顺风是油门,逆风是绞索。`,
 qs:[{q:"公司营业利润$10亿,每年利息支出$8亿,利息覆盖倍数是1.25,意味着?",opts:["很安全,毕竟还盖得住","危险:利润稍一下滑就付不起利息,可能违约","利息不用年年付,没关系"],a:1,
   ex:`✅ 对!赚10亿付8亿利息,只要利润跌20%多就资不抵息。这种公司在加息周期或行业低谷里,股权投资者往往血本无归。`}],
 hw:`查你研究的公司的 <b>Debt to Equity</b>(macrotrends有现成的),对照今天的经验值,给它的"安全性"打个分(安全/一般/危险)。`},

{d:11,wk:2,em:"🌱",title:"增长的质量:营收、EPS与稀释",
 real:`苹果常年花几百上千亿美元<b>回购</b>自家股票,股数逐年变少,同样的利润摊到每股上更多——EPS增速常年<b>快于</b>净利润增速,股东白赚一道。反面例子是一些疯狂发股票期权的公司(比如早年的Snap):公司是在增长,但<b>股数涨得比利润还快</b>,每股价值反而被稀释——你的那一块饼,被越切越薄。`,
 body:[`"增长"是股价的发动机,但要看<b>质量</b>,别只看百分比:`,
 `<b>① 营收增长vs利润增长</b>:最好的状态是利润增速≥营收增速(规模效应显现)。营收狂奔利润不动,要么在烧钱抢地盘(可接受但有风险),要么生意模式有问题。<b>② 自然增长vs收购增长</b>:靠自己产品卖得好,比靠不停买公司"拼"出来的增长更扎实。`,
 `<b>③ 每股(per-share)视角</b>——进阶投资者的秘密武器:公司增长10%,但如果股数也增发了10%(常见于大量发股权激励SBC),<b>你的每股价值原地踏步</b>。反之,利润不变但股数年年回购减少,你的每股价值悄悄变厚。所以看增长,最后都要落到<b>EPS和每股自由现金流</b>上。`],
 analogy:`公司是一张披萨,你持有一块。"增长"是披萨变大,"增发股票"是切的份数变多,"回购"是份数变少。光听"披萨变大了20%"没用——如果同时多切了30份,你手里那块反而缩水了。`,
 tip:`看增长三问:利润跟上营收了吗?是自家长的还是买来的?股数是在变多(稀释)还是变少(回购)?`,
 qs:[{q:"公司净利润增长10%,同时总股数增发了15%,你的EPS大约?",opts:["涨了10%","基本没变","反而下降了约4%"],a:2,
   ex:`✅ 对!EPS=利润÷股数=1.10÷1.15≈0.957,反而降了约4%。公司在"增长",你的每一股却在缩水——这就是稀释的隐形伤害。`}],
 hw:`查你研究的公司最近5年的<b>总股数(Shares Outstanding)</b>变化(macrotrends可查):它在回购变少,还是在增发变多?`},

{d:12,wk:2,em:"🪙",title:"自由现金流FCF:巴菲特最爱的指标",
 real:`苹果每年产生约<b>1000亿美元</b>自由现金流——这是它敢大手笔分红+回购的底气。巴菲特把这种公司叫"印钞机"。许多专业投资者给公司估值时,根本不看市梦率、不听故事,<b>只问一句:它每年能稳定产出多少自由现金?</b>`,
 body:[`<b>自由现金流(Free Cash Flow,FCF)= 经营现金流 − 资本开支(CapEx)</b>。意思是:主业收进来的现金,减去维持和扩张业务必须花的钱(建厂、买设备),<b>剩下真正"自由"的钱</b>。`,
 `为什么它是王牌指标?因为这笔钱公司可以随意支配:分红、回购、还债、收购、存着过冬——<b>股东最终能拿到的一切回报,源头都是FCF</b>。利润可以修饰,FCF很难假装。`,
 `两个实用衍生指标:<b>FCF利润率</b>=FCF÷营收(每100块营收剩多少自由现金,15%+很优秀);<b>FCF收益率</b>=FCF÷市值(把公司整个买下来,每年现金回报率,可以直接和存款利率、国债收益率比!)。`],
 analogy:`你月薪1万(经营现金流),但通勤、工作服、必要的技能课要花2千(资本开支)——真正能存、能花、能投资的是8千(FCF)。一个人真实的财务自由度,看的不是工资条,是这8千。公司也一样。`,
 tip:`FCF=经营现金流−资本开支=公司真正自由支配的钱。股东的一切回报,源头都是它。`,
 widget:"fcf",
 qs:[{q:"公司经营现金流$50亿,资本开支$45亿,净利润$30亿。它的FCF是?",opts:["$30亿","$5亿","$50亿"],a:1,
   ex:`✅ 对!FCF=50-45=$5亿。注意:它账面利润有30亿,但扣掉维持生意必须的重投入,真正自由的钱只剩5亿——重资产生意(航空、芯片厂)常常如此,这正是FCF比净利润更"诚实"的地方。`}],
 hw:`用上面的计算器算算你研究的公司的FCF和FCF收益率,和当前美国国债收益率(~4%)比一比,感受一下贵还是便宜。`},

{d:13,wk:2,em:"🏭",title:"不同行业,不同体检标准",
 real:`2023年初硅谷银行(SVB)倒闭,很多储户和投资者措手不及——因为银行的报表逻辑和普通公司完全不同:存款是它的"负债",贷款是它的"资产",普通公司的指标在它身上几乎全部失灵。<b>用错体检标准,看不出病。</b>`,
 body:[`这周学的指标是"通用体检项",但不同行业要换不同的参考表:`,
 `<b>软件/互联网</b>:看毛利率(应>70%)、营收增速、SBC稀释;烧钱期看"40法则"(增速+利润率>40)。<b>零售/消费</b>:看同店增长、库存周转、净利率趋势。<b>制造/芯片</b>:重资产、强周期,资本开支巨大,FCF常被吞掉,要看整个周期的平均盈利。`,
 `<b>银行/保险</b>:特殊物种——用P/B(市净率)和ROE评估,别用P/E瀑布那套硬套。<b>公用事业</b>:增长慢、债务高是常态,看的是分红稳定性和监管环境。记住:<b>先识别"这是哪种动物",再决定用哪张体检表。</b>`],
 analogy:`体检标准因人而异:运动员心率45是健康,普通人心率45要进医院;孕妇的指标和老人的指标也完全两套。给公司体检同理——先问职业,再读报告。`,
 tip:`指标无绝对好坏,行业才是参照系。科技看毛利和增速,零售看周转,银行看P/B和ROE,公用事业看分红。`,
 qs:[{q:"为什么不该拿软件公司的毛利率(80%)去嘲笑超市(13%)?",opts:["因为超市更努力","因为两种生意模式根本不同,各自和同行比才有意义","因为软件公司在撒谎"],a:1,
   ex:`✅ 对!复制软件几乎零成本,超市进货是真金白银——商业模式决定了利润率的"正常范围"。13%毛利率的Costco是顶级好生意,8%净利率的软件公司反而可能是差等生。`}],
 hw:`给你研究的公司"定个种":它属于今天讲的哪一类?对应该重点看哪2-3个指标?写在你的交易日志里。`},

{d:14,wk:2,em:"📝",title:"第二周 · 周考",
 body:[`指标周完成!这些数字就是你以后给公司做"30秒体检"的工具箱。来检验一下。`],
 analogy:`一套口诀送给你:利润率看赚钱厚度,ROE看股东效率(记得杜邦拆一拆),负债三数保平安,增长要看每股算,FCF才是真金白银。`,
 tip:`指标不是孤立的数字:和自己的历史比看趋势,和同行比看地位,放进行业语境看含义。`,
 qs:[
  {q:"ROE衡量的是?",opts:["公司总资产的规模","股东投入的每一块钱一年赚回多少","公司的市值大小"],a:1,ex:`✅ ROE=净利润÷股东权益,衡量股东的钱的赚钱效率,15%+优秀,长期20%+顶级。`},
  {q:"杜邦分析把ROE拆成哪三件?",opts:["净利率×资产周转率×杠杆倍数","毛利率×税率×股价","营收×利润×市值"],a:0,ex:`✅ 赚得厚不厚×转得快不快×借了多少钱。高ROE要拆开看成色,杠杆撑起来的最脆弱。`},
  {q:"利息覆盖倍数小于2意味着?",opts:["公司很安全","利润稍降就可能付不起利息,危险信号","公司没有债务"],a:1,ex:`✅ 营业利润只够付不到2次利息,缓冲极薄。经验值:>5安全,<2危险。`},
  {q:"净利润涨10%但股数增发15%,对你这个股东意味着?",opts:["每股价值上升","每股价值被稀释,EPS反而下降","没有任何影响"],a:1,ex:`✅ 披萨变大10%,但切的份数多了15%——你那块反而薄了。看增长务必落到"每股"。`},
  {q:"FCF(自由现金流)等于?",opts:["净利润−分红","经营现金流−资本开支","营收−所有成本"],a:1,ex:`✅ 主业收到的现金,减去维持和扩张必须的投入,剩下才是真正自由的钱——股东回报的总源头。`},
  {q:"评估银行股,更合适的主力指标是?",opts:["毛利率","P/B(市净率)+ROE","库存周转率"],a:1,ex:`✅ 银行是特殊物种:存款是负债、贷款是资产,普通指标失灵,业内通用P/B+ROE评估。`}],
 hw:`恭喜!你已经会"读表"+"体检"了。下周进入最激动人心的部分:<b>估值</b>——亲手算出一家公司值多少钱。`},
{d:15,wk:3,em:"🏷️",title:"估值倍数全家福:P/E、P/S、P/B、EV/EBITDA",
 real:`为什么会有这么多"率"?因为<b>P/E会失灵</b>:亚马逊烧钱期利润≈0,P/E高到几千倍甚至没有,看P/E等于瞎了——这时用<b>P/S(市销率)</b>;银行要用<b>P/B(市净率)</b>;收购界大佬们谈生意张口就是<b>EV/EBITDA</b>。工具箱里多几把扳手,遇到什么螺丝都不慌。`,
 body:[`第三周,估值!入门课你学了P/E(股价÷每股盈利),它是主力,但不是万能。认识一下全家福:`,
 `<b>P/S 市销率</b>=市值÷营收:公司还没盈利时的替补指标,常用于高成长科技股。<b>P/B 市净率</b>=市值÷股东权益:衡量"价格是家底的几倍",银行、保险、重资产行业专用。<b>EV/EBITDA</b>:EV=市值+净债务(把债也算进"真实收购价"),EBITDA≈息税折旧前利润——它能跨过债务结构和会计差异,比较不同公司,并购圈最爱。`,
 `怎么选?简单决策树:<b>有稳定利润→P/E为主;没利润但有营收→P/S;银行保险→P/B;债务很重的公司→看EV/EBITDA,别被"便宜的P/E"骗了。</b>`],
 analogy:`量人不能只用体重秤:小孩看身高百分位,健身者看体脂率,老人看骨密度。每个"率"都是一把不同的尺子——对什么公司,用什么尺。`,
 tip:`P/E打主力,没利润用P/S,银行用P/B,重债公司看EV/EBITDA。先选对尺子,再读刻度。`,
 qs:[{q:"一家高速成长但还在亏损的软件公司,最常用哪个估值指标?",opts:["P/E","P/S(市销率)","股息率"],a:1,
   ex:`✅ 对!没有利润,P/E根本算不出来(或是天文数字),只能退一步用市值÷营收。等它盈利稳定了,再切回P/E。`}],
 hw:`查你研究的公司的P/E、P/S、P/B(finviz.com 或 macrotrends 都有),按今天的决策树判断:哪一个对它最有意义?`},

{d:16,wk:3,em:"🚦",title:"PEG:增长调整后的P/E",
 real:`传奇基金经理<b>彼得·林奇</b>发明了这个土办法:P/E除以增速。2023-2024年很多人嫌英伟达"P/E太贵不能买",但当时它利润增速超过100%,按PEG算反而不到1——后来利润暴涨,"贵"的股价回头看竟是便宜的。<b>只看P/E高低就下结论,是新手最常见的误判。</b>`,
 body:[`P/E的盲区:快公司和慢公司不能用同一个标准。P/E 40的公司如果一年增长50%,可能很便宜;P/E 10的公司如果年年衰退,可能贵得要死。`,
 `<b>PEG = P/E ÷ 盈利年增速(%)</b>。比如P/E 30,增速30%,PEG=1。林奇的经验法则:<b>PEG≈1合理,远小于1可能低估,远大于2要小心为"成长的故事"付了太贵的价。</b>`,
 `两个使用警告:① 增速要用<b>未来几年可持续的</b>预期增速,不是去年昙花一现的爆发(去年翻倍≠年年翻倍);② PEG适合<b>成长股</b>,对慢增长的分红股(比如可口可乐)不适用——它们的价值在稳定,不在增速。`],
 analogy:`买跑车,只看标价不看马力是外行:30万的车不一定比15万的"贵"——要看每一匹马力花了多少钱。PEG就是"每一份增长,你付了几倍的价"。`,
 tip:`PEG=P/E÷增速:≈1合理,<1可能便宜,>2小心。用可持续的未来增速,只适用于成长股。`,
 widget:"peg",
 qs:[{q:"A公司P/E=40,预期年增速40%;B公司P/E=12,预期年增速3%。按PEG思路谁更'便宜'?",opts:["B,因为P/E低","A:PEG=1,而B的PEG=4,A为增长付的价更合理","P/E低永远更便宜"],a:1,
   ex:`✅ 对!A每"1%增长"只花1倍P/E,B花了4倍。当然——前提是A的40%增速真能持续,这个判断才是真功夫所在。`}],
 hw:`用上面的PEG计算器,把你研究的公司的P/E和分析师预期增速(finviz的"EPS next 5Y"可查)输进去,看看亮什么灯。`},

{d:17,wk:3,em:"⏳",title:"钱的时间价值:DCF的地基",
 real:`保险公司和彩票机构天天用这个原理赚钱:中了100万大奖"分20年付清",听着风光,按5%折现率算,真实价值只有约65万——剩下35万就是被"时间"吃掉的。<b>看懂折现,你就看懂了金融世界一半的定价逻辑。</b>`,
 body:[`明天就要亲手做DCF了,今天先打牢它唯一的地基:<b>今天的100块 > 明年的100块</b>。为什么?① 今天的钱能立刻投资生息;② 通胀会让钱贬值;③ 未来有不确定性(可能拿不到)。`,
 `所以,未来的钱要"打折"换算成今天的价值,这叫<b>折现(Discounting)</b>。公式:<b>现值 = 未来的钱 ÷ (1+折现率)^年数</b>。折现率10%时,明年的110块=今天的100块;10年后的100块只值今天的约38.6块。`,
 `<b>折现率(Discount Rate)</b>怎么理解?它是你要求的"年回报率门槛":钱放股市平均能赚约10%,所以你对一家公司未来的钱,至少按10%打折——风险越高的公司,要求的折现率越高,未来的钱越不值钱。`],
 analogy:`朋友借钱:"现在给你1000,还是3年后给你1000?"傻子都选现在。那"3年后给1200呢?"——你心里那杆开始权衡的秤,就是折现率。DCF不过是把这杆秤用到公司身上。`,
 tip:`今天的钱>未来的钱;现值=未来金额÷(1+折现率)^年数;折现率=你要求的回报率,风险越高定越高。`,
 widget:"pv",
 qs:[{q:"折现率10%,3年后的$133大约等于今天的多少?",opts:["$133","$100","$163"],a:1,
   ex:`✅ 对!133÷1.1³=133÷1.331≈$100。反过来说:今天的100块按10%复利,3年正好滚成133块——折现就是复利倒着算。`}],
 hw:`用上面的折现器试一个震撼的:输入"30年后的$100万",折现率8%——看看它今天只值多少。(这也是为什么退休储蓄要趁早!)`},

{d:18,wk:3,em:"🧮",title:"动手做一个迷你DCF",
 real:`DCF(现金流折现)是巴菲特口中"估值的唯一正确思路":<b>一家公司的价值=它余生能产生的所有现金,折现到今天的总和</b>。华尔街分析师做的精美模型,内核和你今天这个迷你版一模一样——区别只在参数更细,而<b>参数再细也是猜的</b>。理解逻辑,你就不再迷信任何"目标价"。`,
 body:[`今天是全课程最硬核的一课,慢慢来。迷你DCF四步:`,
 `<b>第1步</b>:起点=公司当前的年自由现金流FCF(第12课学的)。<b>第2步</b>:估计未来5年FCF每年增长多少(看历史增速+行业前景,保守一点)。<b>第3步</b>:5年之后公司不会消失,假设它永远以一个低速(2%~3%,约等于通胀)增长——用"永续公式"算出第5年末的<b>终值</b>=第6年FCF÷(折现率−永续增速)。<b>第4步</b>:把5年的FCF和终值,统统按折现率折回今天,加总=<b>内在价值</b>。和当前市值一比,高估低估一目了然。`,
 `直接玩下面的计算器!预填了一组类似"苹果体型"的数字,拖动滑块感受:<b>折现率或增速轻轻一动,估值天翻地覆</b>——这就是为什么DCF是"思维框架"而不是"精确答案",也是为什么明天要学安全边际。`],
 analogy:`给一只会下金蛋的鹅定价:数清它每年下几个蛋(FCF),估计以后蛋会多还是少(增速),再把未来所有的蛋按"今天的蛋更值钱"打折加总——这就是鹅的真实身价,跟市场上别人吵吵嚷嚷的喊价无关。`,
 tip:`公司价值=未来所有FCF折现之和。DCF给的不是精确答案,是"市场价格隐含了多疯狂的假设"这面照妖镜。`,
 widget:"dcf",
 qs:[{q:"DCF算出内在价值$2000亿,当前市值$3500亿,最合理的解读是?",opts:["市场永远是对的,我的DCF错了","按我的假设,市价隐含了比我乐观得多的预期——要么调研后上调假设,要么承认它对我而言太贵","赶紧做空它"],a:1,
   ex:`✅ 对!DCF的正确用法不是"算出真理",而是反推:现在的价格需要什么样的增长才撑得住?这个增长现实吗?如果要非常激进的假设才撑得住——对你来说它就是贵的。`}],
 hw:`把你研究的公司的真实FCF和市值填进计算器(macrotrends查FCF),用增速8%/折现率10%先跑一版,看看结论。明天我们给它"打折"。`},

{d:19,wk:3,em:"🛡️",title:"安全边际:给自己的估值打个折",
 real:`巴菲特2016年开始买苹果时,它的P/E只有<b>10~12倍</b>——市场当时把它看作"过气硬件公司",而他看到的是粘性极强的消费生态。即使他对增长的判断打八折,这个价格也亏不到哪去——这就是<b>安全边际</b>:不是预测得更准,而是买得足够便宜,容得下自己看错。`,
 body:[`昨天你已经发现:DCF的参数动一动,结论就大变。既然估值必然不精确,怎么办?价值投资祖师爷格雷厄姆的答案:<b>安全边际(Margin of Safety)——只在市价明显低于你估的内在价值时才出手</b>,比如打七折。`,
 `安全边际的本质是<b>为"我可能错了"买保险</b>:增速可能高估了、护城河可能没那么深、行业可能突变。留出30%的折扣,错一两个假设也不至于亏大钱。`,
 `实操三句话:① 用<b>保守假设</b>做DCF(宁可低估);② 算出来后再要求<b>七折买入价</b>;③ 算出来发现现价高于买入价?<b>什么都不做,等。</b>大部分时间,好公司没有好价格——耐心本身就是估值能力的一部分。`],
 analogy:`修桥工程师的做法:卡车最重30吨,桥就按能承重90吨修。不是算不准30吨,而是给意外留余量。买股票同理——用"桥的标准"出价,而不是掐着极限出价。`,
 tip:`安全边际=只在市价明显低于保守估值(如七折)时买入。它保护的不是收益,是"你看错的那一天"。`,
 qs:[{q:"你保守估计某公司内在价值$100/股,要求30%安全边际,现价$95,你应该?",opts:["买,只差5块了","不买,等价格到$70以下,或者去寻找别的机会","加倍买,因为接近内在价值"],a:1,
   ex:`✅ 对!纪律就是用来执行的:$100×0.7=$70才是你的买入线。等不到就放过——市场永远有下一个机会,亏掉的本金却很难回来。`}],
 hw:`给昨天你跑的那版DCF打七折,得出你的"出手价"。把它写进交易日志——这就是你人生第一个<b>自己算出来的目标买入价</b>。`},

{d:20,wk:3,em:"🆚",title:"成长股vs价值股:两种估值思维",
 real:`<b>可口可乐</b>:60多年连续上调分红,增长慢但稳如老狗,P/E常年20出头——买它的人买的是"确定性"。<b>特斯拉</b>:P/E曾在50~1000+之间剧烈摇摆——买它的人买的是"未来可能改变世界"。两种股票,两套语言:用可乐的尺子量特斯拉,或反过来,都会得出荒谬结论。`,
 body:[`市场上有两大门派:<b>价值股</b>——成熟、稳定、分红,增长慢,估值低(可乐、宝洁、银行);<b>成长股</b>——增速快、常不分红、把钱全砸回扩张,估值高(英伟达、特斯拉、新锐软件)。`,
 `关键认知:<b>成长股的高估值,是把未来很多年的预期"预支"进了今天的价格</b>。预期兑现→股价飞;预期落空→双杀(利润降+估值降),跌起来又快又狠。价值股相反:预期本来就低,惊喜少,惊吓也少。`,
 `对你的实操建议:这不是"哪派对"的问题,而是<b>知道自己买的是哪种、用对应的尺子</b>。买成长股,核心功课是验证"增长还在不在"(每季财报盯增速);买价值股,核心功课是验证"稳定还在不在"(分红、现金流、市场地位)。`],
 analogy:`价值股像出租收租的老房子:房租稳定,价格便宜,惊喜不多;成长股像高速发展新区的期房:贵、没现房(分红),赌的是五年后的繁华。都能赚钱——但你得知道自己买的是哪种,别拿期房去要求"现在就收租"。`,
 tip:`成长股价格里预支了未来,盯增速;价值股买的是确定性,盯稳定。先认清买的是哪种,再用对应的尺子。`,
 qs:[{q:"一只高P/E成长股,财报显示增速从40%骤降到15%,为什么股价常常暴跌30%而不是跌一点?",opts:["市场不理性,瞎跌","'双杀':利润预期下调×估值倍数收缩,两个打击相乘","和增速无关,只是巧合"],a:1,
   ex:`✅ 对!高估值靠高增长撑着:增速一失速,EPS预期下调,P/E倍数也从"成长股待遇"降级到"普通股待遇"——两者相乘就是暴跌。这就是成长股最大的风险点。`}],
 hw:`把你自己研究的公司归个派:成长还是价值(或中间)?写下你该盯的核心变量是什么(增速?分红?现金流?)。`},

{d:21,wk:3,em:"📝",title:"第三周 · 周考",
 body:[`估值周完成!这是整个课程最难的一周,你已经拿下了散户最稀缺的技能:<b>对"贵不贵"有自己的判断</b>。来验收。`],
 analogy:`估值三层楼:一楼用倍数(P/E、PEG)快速筛;二楼用DCF算内在价值;三楼用安全边际决定出手价。楼层越高越费功夫,但买入决定越扎实。`,
 tip:`估值不是算命,是纪律:选对尺子→保守假设→打折出手→等不到就放过。`,
 qs:[
  {q:"还没盈利的高成长公司,常用什么指标做初步估值?",opts:["P/E","P/S(市销率)","股息率"],a:1,ex:`✅ 没有E就用S:市值÷营收。等盈利了再切回P/E。`},
  {q:"P/E=36,预期年增速12%,PEG是多少?偏贵还是偏便宜?",opts:["PEG=3,为增长付价偏贵","PEG=0.33,很便宜","PEG=36,无法判断"],a:0,ex:`✅ 36÷12=3,远大于林奇的"≈1合理"线——除非增速被严重低估,否则是在为故事付高价。`},
  {q:"折现率10%,明年的$110折成今天是?",opts:["$110","$100","$121"],a:1,ex:`✅ 110÷1.1=100。折现就是复利倒着算。`},
  {q:"DCF里的'终值(Terminal Value)'指什么?",opts:["公司破产清算的价值","第5年之后公司余生现金流的打包估值","公司账上的现金总额"],a:1,ex:`✅ 预测期(如5年)之后,假设公司以低速永续增长,把余生现金流用永续公式打包估值,再折回今天——它往往占DCF总价值的一大半,所以永续增速要定得保守。`},
  {q:"安全边际的核心目的为?",opts:["让收益最大化","为'自己可能估错了'留出容错空间","保证买在最低点"],a:1,ex:`✅ 它不帮你赚更多,而是在你看错时让你亏得少。估值必然不精确,纪律弥补精度。`},
  {q:"高估值成长股最致命的风险是?",opts:["分红太少","增速失速引发'利润预期+估值倍数'双杀","股价太高,买不起一股"],a:1,ex:`✅ 价格里预支了未来——未来一缩水,双杀又快又狠。买成长股,盯紧增速就是盯紧命门。`}],
 hw:`休息一下!下周是收官:护城河、行业、管理层——把数字之外的"软实力"补上,然后完整分析一家真公司、写下你的第一份投资论文。`},
{d:22,wk:4,em:"🏰",title:"护城河:好生意的四种武器",
 real:`巴菲特原话:"我要的是一座被<b>宽阔护城河</b>环绕的城堡。"经典案例:<b>Visa/万事达</b>——商家不得不接、用户离不开,双边网络越滚越大,营业利润率高达60%+;<b>苹果</b>——iMessage、iCloud、全家桶,换安卓的"麻烦成本"留住了上亿用户。好生意不是没有对手,而是对手<b>打不进来</b>。`,
 body:[`最后一周!财报数字是"过去的成绩",但你买的是"未来"——未来靠什么守住?靠<b>护城河(Moat)</b>:阻止竞争对手抢走利润的持久优势。四种最常见:`,
 `<b>① 品牌(Brand)</b>:同样的东西敢卖更贵——可口可乐、茅台、苹果。<b>② 网络效应(Network Effects)</b>:用的人越多越好用,后来者几乎无法启动——微信、Visa、亚马逊marketplace。<b>③ 转换成本(Switching Costs)</b>:换掉它太麻烦/太疼——银行账户、公司用的Office和Salesforce、苹果全家桶。<b>④ 成本优势(Cost Advantage)</b>:同样的东西我就是能做得更便宜——Costco的规模采购、台积电的制程领先。`,
 `检验护城河的灵魂拷问:<b>"如果给对手100亿美元,它能抢走这家公司的客户吗?"</b>能轻易抢走=没有护城河,利润率早晚被卷掉;抢不走=高利润率能长期维持——这正是高ROE能否持续的根本原因(和第9课接上了!)。`],
 analogy:`街上最火的奶茶店,三个月内隔壁准开出五家山寨——这是没有护城河的生意,再火也守不住。而你家楼下那家开了20年的老字号,靠的是几代人的口碑(品牌)+房东是自家人(成本)——这就是小生意的护城河。`,
 tip:`四大护城河:品牌、网络效应、转换成本、成本优势。灵魂拷问:给对手100亿,能抢走它的客户吗?`,
 widget:"moat",
 qs:[{q:"为什么'网络效应'常被认为是最强的护城河?",opts:["因为它名字好听","因为产品价值随用户数滚雪球,后来者哪怕产品更好也很难冷启动","因为它不需要花钱维护"],a:1,
   ex:`✅ 对!你做一个比微信好10%的App也没用——大家的朋友都在微信上。价值在网络里而不在产品里,这是后来者用钱都砸不开的墙。`}],
 hw:`玩上面的配对游戏,然后给你研究的公司找护城河:四种里它占哪几种?如果一种都说不出来——这本身就是重要结论。`},

{d:23,wk:4,em:"🗺️",title:"行业分析:赛道、天花板与周期",
 real:`选对赛道有多重要?过去几十年,美国烟草行业整体萎缩,而云计算从零长成几千亿市场——同样优秀的管理层,在不同赛道里命运天差地别。芯片业则是另一个教训:<b>强周期</b>,2021年抢破头、2022年砍单堆库存,英伟达这种王者股价也能一年腰斩再涨回三倍。`,
 body:[`公司是船,行业是河。三个问题看懂一条河:`,
 `<b>① 天花板(TAM,Total Addressable Market)</b>:这个市场总共有多大?还在长吗?在一个萎缩的市场里,再强的公司也只是"最大的那条咸鱼"。<b>② 竞争格局</b>:是一两家独大(可口可乐vs百事,Visa vs万事达——舒服的双寡头),还是几十家混战(航空、餐饮——谁都赚不到钱)?巴菲特名言:"当一个以聪明著称的管理层,遇到一个以糟糕著称的行业,留下名声的通常是行业。"`,
 `<b>③ 周期性</b>:<b>周期股</b>(芯片、汽车、能源、航空)业绩随经济大起大落——它们"P/E最低的时候往往是周期顶点"(利润虚高),反而最危险;<b>防御股</b>(食品、公用事业、医疗)经济好坏大家都要用,业绩稳。买周期股,看的是位置;买防御股,看的是价格。`],
 analogy:`再好的船长,在干涸的河道里也跑不出速度;普通的船,顺着涨潮的大河也能走得很远。选公司之前,先看河:水量(TAM)、对手船多不多(格局)、有没有汛期旱季(周期)。`,
 tip:`行业三问:天花板还在长吗?格局是寡头还是混战?是周期股还是防御股?周期股最便宜的P/E常是陷阱。`,
 qs:[{q:"一只芯片股P/E只有8倍,处于历史最低,为什么反而要警惕?",opts:["P/E低说明马上要涨","周期股利润在景气顶点虚高,把P/E压得很低——下一步往往是利润暴跌,'低P/E'瞬间变高","8倍太贵了"],a:1,
   ex:`✅ 对!这叫"周期股的P/E陷阱":顶点利润算出来的P/E最好看,接着利润腰斩,P/E反而飙升,股价已经跌完了。看周期股要看周期位置和P/B,别迷信P/E。`}],
 hw:`判断你研究的公司:它在哪条"河"里?天花板、格局、周期三问各用一句话回答,写进日志。`},

{d:24,wk:4,em:"👔",title:"管理层靠谱吗:数字之外的关键一票",
 real:`正面教材:巴菲特每年亲笔写<b>股东信</b>,大白话讲清楚成绩和错误,几十年如一日——坦诚本身就是能力。反面信号:有的CEO季季吹"史诗级转型",PPT越来越炫,业绩从不兑现;还有的公司高管自己疯狂卖股票,却号召股民"黄金坑加仓"。<b>听其言,更要观其行。</b>`,
 body:[`同样的牌,不同的人打出完全不同的结果。普通投资者评估管理层,看四个可验证的信号:`,
 `<b>① 利益绑定</b>:高管自己持多少股?创始人持大量股份(skin in the game)和职业经理人拿天价薪酬+疯狂期权,动力完全不同。内部人近期是真金白银<b>增持</b>还是悄悄<b>减持</b>?(8-K/Form 4里全查得到)。<b>② 说到做到</b>:翻出两三年前的财报电话会,当时承诺的目标兑现了吗?年年画饼年年落空的,直接扣大分。`,
 `<b>③ 资本分配能力</b>:赚来的钱花得聪明吗?——高位回购还是低位回购?收购是协同还是乱买?分红是否量力?<b>④ 坦诚度</b>:做错事敢不敢认?坏消息是主动披露还是藏着掖着?读一封它家的股东信/听一场电话会,语感骗不了人:满嘴流行词、从不谈问题的,小心。`],
 analogy:`选管理层像选合伙开店的合伙人:他自己投了多少钱进来?去年说好的装修做了吗?赚了钱是乱挥霍还是精打细算?出了问题是认账还是甩锅?——你不会跟一个光会吹的人合伙,买股票就是在选合伙人。`,
 tip:`四个信号:持股绑定、承诺兑现率、资本分配、坦诚度。内部人用钱投票,比用嘴承诺可信。`,
 qs:[{q:"以下哪个最能说明管理层和股东利益一致?",opts:["CEO在采访里说'我们视股东为家人'","创始人持有公司15%股份,且最近自掏腰包增持","公司官网价值观写着'股东第一'"],a:1,
   ex:`✅ 对!Skin in the game——他的身家和你绑在同一条船上,他亏你才亏。语言是廉价的,持仓是诚实的。`}],
 hw:`查你研究的公司:CEO是创始人吗?持股多少?(Google "[公司名] insider ownership")近半年内部人是买还是卖?`},

{d:25,wk:4,em:"🔬",title:"实战:30分钟完整分析一家公司",
 real:`今天用<b>Costco(COST)</b>做完整示范——因为它"指标难看却是顶级好生意",最能逼你综合思考:毛利率仅约12%,净利率不到3%,P/E却常年35倍+。便宜的指标买不到它,看懂的人才拿得住:会员费贡献了利润的大头、续费率高达90%+、全球扩张空间仍在。<b>数字会说话,但要连起来听。</b>`,
 body:[`把四周所学装配成一条<b>分析流水线</b>,以后每研究一家公司,就跑一遍这六步(以Costco为例):`,
 `<b>第1步·这是什么生意?</b>仓储会员制零售:故意低毛利卖货拢人,赚会员费。<b>第2步·财报三表扫一遍</b>:营收稳增、经营现金流>净利润(健康)、债务温和。<b>第3步·关键指标</b>:毛利率12%(模式使然,不是病)、ROE~30%(高周转型,杜邦拆解印证)、FCF稳定为正。<b>第4步·护城河</b>:成本优势(规模采购)+会员粘性(转换成本),续费率90%+就是护城河的体温计。`,
 `<b>第5步·行业</b>:零售大盘慢,但它在持续抢份额+海外扩张,天花板未到。<b>第6步·估值</b>:P/E 35+,PEG明显>2——<b>结论:顶级好公司+不便宜的价格</b>。按安全边际纪律:列入观察清单,等回调,或者承认"好公司贵着买"的策略并接受较低预期回报——这是你自己的决定,但现在它是<b>有依据的决定</b>。`],
 analogy:`这就像老中医看诊:望(什么生意)、闻(三表)、问(指标和护城河)、切(估值)。单看任何一项都会误诊——12%的毛利率单独看像"病",放进会员制模式里看是"招"。`,
 tip:`六步流水线:生意模式→三表→指标→护城河→行业→估值。结论永远是"好公司"和"好价格"两个判断的组合。`,
 qs:[{q:"Costco净利率不到3%,为什么仍被公认为顶级生意?",opts:["因为分析师都收了钱","低价是它故意的战略:用近乎零利润的商品锁住会员,真正利润来自高续费率的会员费,护城河极深","净利率低就是差生意,公认是错的"],a:1,
   ex:`✅ 对!它"放弃"商品利润换取无可撼动的用户忠诚——对手降价它跟得起,对手学它学不像。指标的"难看"恰恰是战略的一部分。这就是为什么分析不能只扫数字。`}],
 hw:`照着六步流水线,给<b>你自己研究的公司</b>每步写一句话,凑成你的第一份"一页纸分析"。明天我们把它升级成正式的投资论文。`},

{d:26,wk:4,em:"🧾",title:"写下你的投资论文(Thesis)",
 real:`几乎所有专业基金的纪律:<b>买任何东西之前,先写下投资论文(Investment Thesis)</b>。彼得·林奇的版本更亲民:"买之前,你要能用两分钟,对一个孩子讲清楚你为什么买它。"讲不清楚=你买的不是公司,是心情。`,
 body:[`投资论文只需三段话:`,
 `<b>① 我为什么相信它会赢?</b>(生意模式+护城河+行业位置,用你自己的话)<b>② 哪些事必须保持为真?</b>(支撑你判断的2-3个关键假设,比如"会员续费率保持90%+"、"云业务增速不低于20%")<b>③ 什么情况下我承认看错、卖出?</b>(假设被打破的具体信号——提前写好,免得到时候舍不得)`,
 `论文的威力在<b>买入之后</b>:股价暴跌30%,慌不慌?打开论文——三个假设还成立吗?成立,那只是市场情绪,甚至是加仓机会;不成立,认错离场。<b>它把"该怎么办"从情绪问题变成核对问题。</b>用下面的小工具写下来,它会自动保存。`],
 analogy:`像出海前写好的航海计划:目的地、航线依据、什么天气必须返航。风暴来临时(暴跌),新手凭恐惧乱转舵,老手翻出计划核对——计划没破就继续航行。写计划的最佳时机,永远是风平浪静的现在。`,
 tip:`三段论文:为什么赢?什么必须为真?什么信号该卖?写在买入前,用在暴跌时。`,
 widget:"thesis",
 qs:[{q:"投资论文最大的实战价值是?",opts:["晒在社交媒体上","暴跌时把'怎么办'从情绪问题变成核对问题:假设没破就拿住,破了就认错","保证你买的股票只涨不跌"],a:1,
   ex:`✅ 对!论文不会让你不亏钱,但能让你<b>因为正确的理由</b>持有或卖出——长期下来,这比任何"消息"都值钱。`}],
 hw:`用上面的工具,给你研究的公司写下三段论文。写不出第②段(关键假设)?说明研究还不够——回到第25课的流水线再跑一遍。`},

{d:27,wk:4,em:"🔔",title:"论文被打破时:进阶卖出纪律",
 real:`经典对照:<b>2020年3月新冠暴跌</b>,苹果跌了30%,但"生态粘性"的论文丝毫未损——卖掉的人事后捶胸顿足。而<b>英特尔</b>2020年宣布7纳米工艺再度延期、制程被台积电反超——这是"技术领先"论文的<b>结构性破裂</b>,当时止损的人躲过了后面多年的沉沦。<b>同样是下跌,一个该拿住,一个该离场——区别全在论文。</b>`,
 body:[`入门课学过"别因为恐慌卖"。进阶版:<b>到底什么时候该卖?</b>四种正当理由:`,
 `<b>① 论文被打破</b>:支撑买入的关键假设被证伪(技术被反超、护城河被攻破、管理层造假)——最该果断的一种,跌了也要卖,"等回本"是新手最贵的执念。<b>② 估值疯狂</b>:涨到任何保守假设都撑不住的价格,可以分批兑现。<b>③ 有明显更好的去处</b>:卖掉论文一般的,换论文更硬+价格更好的。<b>④ 生活需要钱</b>:天经地义,投资为生活服务。`,
 `反过来,<b>不构成卖出理由的</b>:股价跌了(但论文完好)、涨了很多(但论文更强了)、别人都在卖、想"落袋为安一下再接回来"(高抛低吸的妄想)。注意税务细节:卖出盈利的持仓,记得入门课学的<b>长期vs短期资本利得税</b>差异——持有超过一年,税率低一大截。`],
 analogy:`船漏了(论文破)→弃船,哪怕它曾是好船;风浪大但船完好(价格跌)→握紧舵,别跳海。新手盯着海浪做决定,老手盯着船体做决定。`,
 tip:`四个该卖:论文破裂、估值疯狂、更好去处、生活需要。一个不该卖:论文完好,只是价格在跌。`,
 qs:[{q:"你持有的公司股价腰斩,核对论文:三个关键假设全部完好,行业地位反而增强。进阶投资者的做法是?",opts:["立刻割肉,跌一定有原因","按论文办事:继续持有,甚至按纪律考虑分批加仓","发誓回本就卖"],a:1,
   ex:`✅ 对!价格波动≠论文破裂。2020年3月的苹果就是这道题的真实版。当然,前提是你的论文当初写得够扎实——这就是第26课的价值。`}],
 hw:`给你的论文补上"卖出触发器":写下2-3个具体信号(如"续费率跌破85%"、"核心高管批量离职"),以后每季财报对照检查。`},

{d:28,wk:4,em:"🎓",title:"毕业考 + 你的分析师工具箱",
 body:[`四周前你只会"看着买",现在你拥有一条完整流水线:<b>读三表→查指标→找护城河→看行业→评管理层→算估值→写论文→守纪律</b>。先用下面的工具箱给自己留个"传家清单",再来一场毕业考!`],
 analogy:`四周总结成一句话:<b>价格是你付出的,价值是你得到的</b>(巴菲特)。入门课教你怎么"付出价格",这门课教你怎么掂量"得到的价值"。`,
 tip:`分析是手艺,纪律是护甲,耐心是杠杆。每季财报跑一遍流水线,十年后你会感谢今天。`,
 widget:"toolbox",
 qs:[
  {q:"利润表、资产负债表、现金流量表分别回答什么问题?",opts:["赚不赚钱/家底如何/现金真实流动","股价高低/分红多少/谁是CEO","过去/现在/未来"],a:0,ex:`✅ 成绩单+家底快照+银行流水,三表连看,互相验证。`},
  {q:"看到一家公司ROE高达40%,你的第一反应应该是?",opts:["直接买入","用杜邦拆解:是净利率、周转还是杠杆撑起来的?","ROE越高越危险,跑"],a:1,ex:`✅ 高ROE要验成色:靠本事(净利率/周转)还是靠借钱(杠杆)?顺手再看它能不能持续——能持续的高ROE背后一定有护城河。`},
  {q:"FCF为什么比净利润更难造假?",opts:["因为它数字更小","因为它基于实际现金进出,而利润包含大量会计估计与调整","它其实更容易造假"],a:1,ex:`✅ 利润是"算"出来的(可调节),现金是"数"出来的。瑞幸式造假在现金流上露馅,就是这个原理。`},
  {q:"DCF估值中,对结果影响最大的两个假设是?",opts:["公司名字和上市地点","增长率与折现率","CEO年龄和办公楼位置"],a:1,ex:`✅ 这两个参数轻轻一动,估值天翻地覆——所以要用保守假设+安全边际,把"估不准"变成纪律问题。`},
  {q:"四种经典护城河是?",opts:["品牌、网络效应、转换成本、成本优势","广告、补贴、融资、上新闻","高股价、高市值、高P/E、高知名度"],a:0,ex:`✅ 灵魂拷问记住了吗:给对手100亿,能抢走它的客户吗?`},
  {q:"周期股在P/E最低时买入,为什么常是陷阱?",opts:["P/E低说明没人喜欢","景气顶点利润虚高把P/E压低,随后利润暴跌——'便宜'是幻觉","周期股不能用任何指标"],a:1,ex:`✅ 周期股要看周期位置,P/E反着用:"高P/E"(利润谷底)反而常是底部区域。`},
  {q:"持仓暴跌30%,正确的第一步是?",opts:["立刻全卖","打开投资论文,核对关键假设是否被打破","加杠杆抄底"],a:1,ex:`✅ 论文没破=市场情绪,论文破了=果断离场。把情绪问题变成核对问题——这就是这门课教你的最值钱的一招。`},
  {q:"'价格是你付出的,价值是你得到的'——这句话提醒我们?",opts:["股价越低越好","买入决定=好公司判断+好价格判断,缺一不可","价值是无法估算的"],a:1,ex:`✅ 🎓 恭喜毕业!好公司+坏价格=平庸回报;普通公司+极好价格=机会;好公司+好价格=财富。耐心等待第三种。`}],
 hw:`🎓 毕业了!给自己安排一个"季度仪式":每次财报季,挑一家公司跑一遍六步流水线+更新论文。坚持一年,你会超过90%的散户。彩蛋课见!`},

{d:29,wk:5,em:"🎁",title:"彩蛋课:财报季实战,听懂一场Earnings Call",
 real:`如今每季度<b>英伟达发财报的那个下午</b>,几乎成了全球市场屏息的时刻——一份指引(guidance)能带动整个科技板块盘后狂涨暴跌。2024年有一季它营收利润双双大超预期,股价盘后反而跌——因为<b>市场已经把"超级超预期"提前计入价格,"普通超预期"反而成了失望</b>。看懂这个现象,你就毕业了。`,
 body:[`每季财报季(1月、4月、7月、10月前后),你研究的公司都会经历一场大考。实战流程:`,
 `<b>赛前</b>:Fidelity个股页能看到财报日期(earnings date)和分析师预期(EPS与营收的consensus)。<b>当天</b>:公司发布新闻稿,媒体瞬间标出<b>beat(超预期)还是miss(不及预期)</b>。但价格反应常常"反直觉"——关键在第三样东西:<b>指引(Guidance)</b>,即管理层对下季度/全年的预测。本季再漂亮,指引疲软照样暴跌;本季难看,指引强劲反而大涨。<b>市场永远在为未来定价。</b>`,
 `<b>赛后</b>:别只看涨跌,去听/读<b>电话会(Earnings Call)</b>——重点听分析师提问环节(Q&A):管理层答得坦荡还是闪躲?然后做真正的功课:<b>更新你的论文</b>——关键假设(增速、利润率、续费率…)被这季数据加强了还是削弱了?这才是财报季对长期投资者的真正意义。`],
 analogy:`财报季像期中考试放榜:分数(EPS)大家都看得到,但聪明家长听的是老师的"下学期预测"(指引)和孩子答疑时的状态(Q&A)。一次考分定不了终身,趋势和态度才定。`,
 tip:`财报三件套:结果vs预期(beat/miss)、指引(更重要)、电话会Q&A(最见人品)。看完更新论文,而不是追涨杀跌。`,
 widget:"earnings",
 qs:[{q:"公司本季EPS大超预期,但下调了全年指引,股价最可能?",opts:["大涨,毕竟本季超预期","下跌:市场为未来定价,指引下调比本季成绩更重要","完全不动"],a:1,
   ex:`✅ 对!股价=对未来现金流的定价(DCF思维!),指引直接改写"未来"。这就是为什么财报季常出现"业绩好却大跌"——你现在完全看得懂了。`}],
 hw:`查一下你研究的公司<b>下一次财报日期</b>,在日历上标好。到时候用今天的"三件套"亲历一场财报季——这是这两门课所有知识的毕业实战。🎓`},
];

/* ============ 状态 ============ */
const KEY="myStockCourse2Progress_v1";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{done:{}}}catch(e){return{done:{}}}}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}}
let state=load();
let view={page:"home"};
let LQ=null;

function doneCount(){return Object.keys(state.done).filter(k=>state.done[k]).length}
function firstUndone(){for(const L of LESSONS){if(!state.done[L.d])return L.d}return LESSONS.length}

/* ============ 渲染 ============ */
const app=document.getElementById("app");
function render(){
  if(view.page==="home")renderHome();
  else renderLesson(view.day);
  window.scrollTo(0,0);
}

function renderHome(){
  const total=LESSONS.length, done=doneCount();
  const pct=Math.round(done/total*100);
  const cur=firstUndone();
  let weeksHtml="";
  for(const w of [1,2,3,4,5]){
    const ls=LESSONS.filter(l=>l.wk===w);
    let chips="";
    for(const l of ls){
      const isDone=!!state.done[l.d];
      const isCur=l.d===cur && !isDone;
      const isExam=l.qs.length>1;
      const dLabel=l.d===29?'🎁 彩蛋课':(isExam?(l.d===28?'🎓 毕业考 · 第 28 天':'📝 周考 · 第 '+l.d+' 天'):'第 '+l.d+' 天');
      chips+=`<div class="chip ${isDone?'done':''} ${isCur?'current':''} ${isExam?'exam':''}" onclick="open_(${l.d})">
        ${isDone?'<span class="check">✓</span>':''}
        <div class="em">${l.em}</div>
        <div class="d">${dLabel}</div>
        <div class="t">${l.title}</div>
      </div>`;
    }
    weeksHtml+=`<div class="week"><h2>${WEEKS[w].t}</h2><div class="sub">${WEEKS[w].s}</div><div class="grid">${chips}</div></div>`;
  }
  app.innerHTML=`
    <div class="hero">
      <div class="spark">🔬</div>
      <h1>我的股票进阶课</h1>
      <p>4 周 · 28 节 + 🎁 彩蛋课 · 每天 10–15 分钟。读财报、算估值、写论文——像分析师一样思考。<br><span style="opacity:.75;font-size:13px">📗 前传:《我的股票互动课》入门篇</span></p>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="pmeta"><span>已完成 ${done} / ${total} 节</span><span>${pct}%</span></div>
      <button class="btn" onclick="open_(${cur})">${done===0?'开始第 1 课 →':(done===total?'🏆 全部学完 · 复习':'继续学习 · 第 '+cur+' 课 →')}</button>
    </div>
    ${weeksHtml}
    <div class="foot-note">这是一份学习资料,不构成任何投资建议。投资有风险,请只用闲钱、独立决策。<br>进度自动保存在本浏览器里。每天学一点,坚持就是胜利 💪</div>
  `;
}

function renderLesson(day){
  const L=LESSONS.find(l=>l.d===day);
  const multi=L.qs.length>1;
  LQ={answered:Array(L.qs.length).fill(false),correct:0,total:L.qs.length};
  const bodyHtml=L.body.map(p=>`<p>${p}</p>`).join("");
  const widgetHtml=L.widget?renderWidget(L.widget):"";
  let qsHtml="";
  L.qs.forEach((q,qi)=>{
    let opts="";
    q.opts.forEach((o,oi)=>{opts+=`<button class="opt" id="o-${qi}-${oi}" onclick="ans(${qi},${oi},${q.a})">${o}</button>`});
    qsHtml+=`<div class="qitem"><div class="q">${multi?(qi+1)+". ":""}${q.q}</div><div id="opts-${qi}">${opts}</div><div class="explain" id="ex-${qi}">${q.ex}</div></div>`;
  });
  const quizHead=multi?(L.d===28?`🎓 毕业考 · 共 ${L.qs.length} 题`:`📝 本周小考 · 共 ${L.qs.length} 题`):`🧠 今日小测验`;
  const scoreHtml=multi?`<div class="score" id="score">答对 0 / ${L.qs.length}</div><br>`:``;
  const isLast=day===LESSONS.length;
  const nextDay=day<LESSONS.length?day+1:null;
  const tagText=L.d===29?'🎁 彩蛋课 · 财报季实战':`${WEEKS[L.wk].t} · 第 ${L.d} 天 / 共 28 天`;
  app.innerHTML=`
    <div class="lesson">
      <div class="lhead">
        <span class="em">${L.em}</span>
        <div class="tag">${tagText}</div>
        <h2>${L.title}</h2>
      </div>
      <div class="lbody">
        ${bodyHtml}
        ${L.real?`<div class="block real"><div class="h">🌍 真实案例</div>${L.real}</div>`:""}
        <div class="block analogy"><div class="h">💡 打个比方</div>${L.analogy}</div>
        ${widgetHtml}
        <div class="block tip"><div class="h">📌 一句话记住</div>${L.tip}</div>
        <div class="quiz">
          <div class="qhead">${quizHead}</div>
          ${scoreHtml}
          ${qsHtml}
        </div>
        <div class="block hw"><div class="h">📝 今日作业(几分钟)</div>${L.hw}</div>
      </div>
      <div class="lfoot">
        <button class="backlink" onclick="home_()">← 返回目录</button>
        <button class="btn" onclick="complete(${L.d})">${state.done[L.d]?(nextDay?'下一课 →':'🎉 回到目录'):(isLast?'🏆 完成全部课程!':'完成本课 →')}</button>
      </div>
    </div>
  `;
  if(L.widget)initWidget(L.widget);
}

/* ============ 交互 ============ */
function open_(d){view={page:"lesson",day:d};render()}
function home_(){view={page:"home"};render()}
function ans(qi,oi,correct){
  if(LQ.answered[qi])return;
  LQ.answered[qi]=true;
  const opts=document.querySelectorAll(`#opts-${qi} .opt`);
  opts.forEach((b,idx)=>{b.disabled=true;if(idx===correct)b.classList.add("correct");if(idx===oi&&oi!==correct)b.classList.add("wrong")});
  document.getElementById(`ex-${qi}`).classList.add("show");
  if(oi===correct)LQ.correct++;
  const sc=document.getElementById("score");
  if(sc){
    const answered=LQ.answered.filter(Boolean).length;
    if(answered===LQ.total){
      sc.textContent=`考试完成:答对 ${LQ.correct} / ${LQ.total} ${LQ.correct===LQ.total?"🏆 满分!太强了!":"👍 不错,继续加油!"}`;
      sc.classList.add("done");
    }else{
      sc.textContent=`答对 ${LQ.correct} / ${LQ.total} · 还剩 ${LQ.total-answered} 题`;
    }
  }
}
function complete(d){
  const wasDone=state.done[d];
  state.done[d]=true;save(state);
  if(!wasDone){
    const c=doneCount();
    let msg="✅ 完成第 "+d+" 课!";
    if(d%7===0 && d<28)msg="🎉 太棒了!完成一整周 + 周考!";
    if(d===28)msg="🎓 毕业考通过!就剩彩蛋课了!";
    if(c===LESSONS.length)msg="🏆 全部完成!你已经是有体系的分析者了!";
    toast(msg);
  }
  const nextDay=d<LESSONS.length?d+1:null;
  setTimeout(()=>{ if(nextDay && !wasDone){open_(nextDay)} else {home_()} }, wasDone?0:750);
}
let toastTimer;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400)}

/* ============ 小工具 widget ============ */
function renderWidget(type){
  if(type==="waterfall")return `<div class="widget"><h4>💧 利润瀑布计算器(输入你研究的公司的数字)</h4>
    <div class="field"><label>营收 ($亿)</label><input type="number" id="wf-rev" value="100" step="1"></div>
    <div class="field"><label>销售成本 COGS</label><input type="number" id="wf-cogs" value="40" step="1"></div>
    <div class="field"><label>运营费用</label><input type="number" id="wf-opex" value="30" step="1"></div>
    <div class="field"><label>利息和税</label><input type="number" id="wf-tax" value="10" step="1"></div>
    <div class="out"><div class="wfall" id="wf-bars"></div><div class="wfall-x"><span>营收</span><span>毛利</span><span>营业利润</span><span>净利润</span></div>
    <div id="wf-note" style="font-size:13.5px;color:#6b7280;margin-top:10px"></div></div></div>`;
  if(type==="balance")return `<div class="widget"><h4>⚖️ 家底计算器:资产 = 负债 + 股东权益</h4>
    <div class="field"><label>总资产 ($亿)</label><input type="number" id="bs-a" value="500" step="1"></div>
    <div class="field"><label>总负债 ($亿)</label><input type="number" id="bs-l" value="420" step="1"></div>
    <div class="out">股东权益 = <span class="big" id="bs-out">80</span> $亿<div id="bs-note" style="font-size:13.5px;color:#6b7280;margin-top:6px"></div></div></div>`;
  if(type==="cashsort")return `<div class="widget"><h4>🎮 现金流分类小游戏:这笔钱属于哪一段?</h4>
    <div id="cs-q" style="font-size:15.5px;font-weight:700;margin-bottom:12px"></div>
    <div id="cs-btns">
      <button class="sortbtn" onclick="csAns(0)">🏪 经营</button>
      <button class="sortbtn" onclick="csAns(1)">🏗️ 投资</button>
      <button class="sortbtn" onclick="csAns(2)">🏦 筹资</button>
    </div>
    <div class="out" id="cs-out" style="display:none"></div></div>`;
  if(type==="margin")return `<div class="widget"><h4>📊 真实公司利润率对比器(2024-25财年量级)</h4>
    <div class="seg" id="mg-seg">
      <button class="on" onclick="mgPick(0)">苹果</button>
      <button onclick="mgPick(1)">英伟达</button>
      <button onclick="mgPick(2)">Costco</button>
      <button onclick="mgPick(3)">沃尔玛</button>
    </div>
    <div class="out"><div class="wfall" id="mg-bars" style="height:100px"></div>
    <div class="wfall-x"><span>毛利率</span><span>净利率</span></div>
    <div id="mg-note" style="font-size:13.5px;color:#6b7280;margin-top:10px"></div></div></div>`;
  if(type==="dupont")return `<div class="widget"><h4>🔧 杜邦分析模拟器:ROE = 净利率 × 周转 × 杠杆</h4>
    <div class="field"><label>净利率</label><input type="range" id="dp-m" min="1" max="30" step="1" value="10"><span class="rng-val" id="dp-m-v">10%</span></div>
    <div class="field"><label>资产周转率</label><input type="range" id="dp-t" min="2" max="30" step="1" value="10"><span class="rng-val" id="dp-t-v">1.0次</span></div>
    <div class="field"><label>杠杆倍数</label><input type="range" id="dp-l" min="10" max="80" step="5" value="20"><span class="rng-val" id="dp-l-v">2.0倍</span></div>
    <div class="out">ROE = <span class="big" id="dp-out">20.0%</span><div id="dp-note" style="font-size:13.5px;color:#6b7280;margin-top:6px"></div></div></div>`;
  if(type==="fcf")return `<div class="widget"><h4>🪙 自由现金流计算器</h4>
    <div class="field"><label>经营现金流 ($亿)</label><input type="number" id="fc-ocf" value="500" step="1"></div>
    <div class="field"><label>资本开支 CapEx</label><input type="number" id="fc-capex" value="100" step="1"></div>
    <div class="field"><label>当前市值 ($亿)</label><input type="number" id="fc-mcap" value="10000" step="10"></div>
    <div class="out">FCF = <span class="big" id="fc-out">400</span> $亿<div id="fc-note" style="font-size:13.5px;color:#6b7280;margin-top:6px"></div></div></div>`;
  if(type==="peg")return `<div class="widget"><h4>🚦 PEG 红绿灯</h4>
    <div class="field"><label>市盈率 P/E</label><input type="number" id="pg-pe" value="30" step="0.1"></div>
    <div class="field"><label>预期年增速 (%)</label><input type="number" id="pg-g" value="15" step="0.5"></div>
    <div class="out">PEG = <span class="big" id="pg-out">2.0</span> <span id="pg-pill"></span><div id="pg-note" style="font-size:13.5px;color:#6b7280;margin-top:6px"></div></div></div>`;
  if(type==="pv")return `<div class="widget"><h4>⏳ 折现器:未来的钱,今天值多少?</h4>
    <div class="field"><label>未来金额 ($)</label><input type="number" id="pv-fv" value="10000" step="100"></div>
    <div class="field"><label>多少年后</label><input type="range" id="pv-n" min="1" max="40" step="1" value="10"><span class="rng-val" id="pv-n-v">10 年</span></div>
    <div class="field"><label>折现率</label><input type="range" id="pv-r" min="2" max="15" step="1" value="8"><span class="rng-val" id="pv-r-v">8%</span></div>
    <div class="out">今天只值 <span class="big" id="pv-out">$4,632</span><div id="pv-note" style="font-size:13.5px;color:#6b7280;margin-top:6px"></div></div></div>`;
  if(type==="dcf")return `<div class="widget"><h4>🧮 迷你 DCF 估值器(预填了一家"苹果体型"的公司)</h4>
    <div class="field"><label>当前年FCF ($亿)</label><input type="number" id="dc-fcf" value="1000" step="10"></div>
    <div class="field"><label>前5年增速</label><input type="range" id="dc-g" min="0" max="30" step="1" value="8"><span class="rng-val" id="dc-g-v">8%</span></div>
    <div class="field"><label>永续增速</label><input type="range" id="dc-gt" min="0" max="4" step="0.5" value="2.5"><span class="rng-val" id="dc-gt-v">2.5%</span></div>
    <div class="field"><label>折现率</label><input type="range" id="dc-r" min="6" max="15" step="0.5" value="10"><span class="rng-val" id="dc-r-v">10%</span></div>
    <div class="field"><label>当前市值 ($亿)</label><input type="number" id="dc-mcap" value="32000" step="100"></div>
    <div class="out">内在价值 ≈ <span class="big" id="dc-out">$0</span> $亿<div id="dc-verdict" style="margin-top:8px"></div><div id="dc-note" style="font-size:13.5px;color:#6b7280;margin-top:8px"></div></div></div>`;
  if(type==="moat")return `<div class="widget"><h4>🏰 护城河配对游戏:这家公司主要靠哪条河?</h4>
    <div id="mt-rows"></div>
    <div class="out" id="mt-out" style="display:none"></div></div>`;
  if(type==="thesis")return `<div class="widget"><h4>✍️ 我的投资论文生成器(自动保存在本浏览器)</h4>
    <div class="field"><label>公司名</label><textarea id="th-name" rows="1" placeholder="比如:Costco (COST)"></textarea></div>
    <div class="field"><label>① 为什么会赢</label><textarea id="th-why" rows="3" placeholder="生意模式+护城河,用你自己的话…"></textarea></div>
    <div class="field"><label>② 什么必须为真</label><textarea id="th-true" rows="3" placeholder="2-3个关键假设,比如:会员续费率保持90%+…"></textarea></div>
    <div class="field"><label>③ 什么信号该卖</label><textarea id="th-sell" rows="3" placeholder="提前写好认错条件,比如:续费率跌破85%…"></textarea></div>
    <div class="out" id="th-out">开始填写,你的论文会实时出现在这里 👇</div></div>`;
  if(type==="toolbox")return `<div class="widget"><h4>🧰 分析师传家清单:出手前过一遍(自动保存)</h4>
    <div id="tb-list"></div>
    <div class="out" id="tb-out"></div></div>`;
  if(type==="earnings")return `<div class="widget"><h4>🎮 财报反应模拟器:猜猜盘后怎么走?</h4>
    <div id="er-q" style="font-size:15.5px;font-weight:700;margin-bottom:12px"></div>
    <div id="er-btns">
      <button class="sortbtn" onclick="erAns(0)">📈 大涨</button>
      <button class="sortbtn" onclick="erAns(1)">📉 大跌</button>
      <button class="sortbtn" onclick="erAns(2)">🤷 难说</button>
    </div>
    <div class="out" id="er-out" style="display:none"></div></div>`;
  return "";
}

/* ---------- widget 逻辑 ---------- */
function fmt(n){return n.toLocaleString("en-US",{maximumFractionDigits:0})}

function initWidget(type){
  if(type==="waterfall"){
    const upd=()=>{
      const rev=+document.getElementById("wf-rev").value||0;
      const cogs=+document.getElementById("wf-cogs").value||0;
      const opex=+document.getElementById("wf-opex").value||0;
      const tax=+document.getElementById("wf-tax").value||0;
      const gp=rev-cogs, op=gp-opex, ni=op-tax;
      const vals=[rev,gp,op,ni], colors=["#6366f1","#8b5cf6","#a78bfa",ni>=0?"#16a34a":"#dc2626"];
      const mx=Math.max(rev,1);
      document.getElementById("wf-bars").innerHTML=vals.map((v,i)=>`<div class="bar" style="height:${Math.max(4,Math.round(Math.max(v,0)/mx*100))}%;background:${colors[i]}"><span>${v.toFixed(0)}</span></div>`).join("");
      const pm=(x)=>rev>0?(x/rev*100).toFixed(1)+"%":"—";
      document.getElementById("wf-note").innerHTML=`毛利率 <b>${pm(gp)}</b> · 营业利润率 <b>${pm(op)}</b> · 净利率 <b>${pm(ni)}</b>${ni<0?" · ⚠️ 净利润为负:这家公司目前在亏损":""}`;
    };
    ["wf-rev","wf-cogs","wf-opex","wf-tax"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="balance"){
    const upd=()=>{
      const a=+document.getElementById("bs-a").value||0, l=+document.getElementById("bs-l").value||0;
      const e=a-l;
      document.getElementById("bs-out").textContent=fmt(e);
      const pct=a>0?(l/a*100).toFixed(0):"—";
      document.getElementById("bs-note").innerHTML=e<0?`⚠️ <b style="color:#dc2626">资不抵债!</b>负债比资产还多——这家公司的股东权益是负的,极度危险。`:`负债占资产的 <b>${pct}%</b>。${pct>80?"杠杆很高:顺风赚得快,逆风可能被债压垮。":pct>50?"杠杆中等,要结合行业看。":"家底厚实,抗风险能力强。"}`;
    };
    ["bs-a","bs-l"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="cashsort"){
    window._cs={i:0,score:0,items:[
      {t:"收到客户支付的货款",k:0,e:"主业收到现金 → 经营现金流"},
      {t:"花 $2亿 购买新厂房和设备",k:1,e:"为发展投入(这就是资本开支CapEx)→ 投资现金流"},
      {t:"向股东发放现金分红",k:2,e:"把钱还给出资人 → 筹资现金流"},
      {t:"支付员工工资和供应商货款",k:0,e:"维持主业运转 → 经营现金流"},
      {t:"卖掉一条不用的旧生产线",k:1,e:"处置长期资产(钱流入)→ 投资现金流"},
      {t:"发行债券借到 $5亿",k:2,e:"向债主拿钱(流入)→ 筹资现金流"}]};
    csShow();
  }
  if(type==="margin"){window._mg=[
    {n:"苹果 AAPL",g:46,nn:24,c:"硬件+服务生态,高端定价权——又厚又稳。"},
    {n:"英伟达 NVDA",g:75,nn:56,c:"垄断级AI芯片,定价权拉满——这是稀有动物,别拿它当普通标准。"},
    {n:"Costco COST",g:12,nn:2.9,c:"故意薄利锁客,利润大头来自会员费——低利润率≠差生意。"},
    {n:"沃尔玛 WMT",g:25,nn:2.7,c:"巨量低价零售,赚的是'量'——和Costco同行,模式略不同。"}];
    mgPick(0);
  }
  if(type==="dupont"){
    const upd=()=>{
      const m=+document.getElementById("dp-m").value, t=+document.getElementById("dp-t").value/10, l=+document.getElementById("dp-l").value/10;
      document.getElementById("dp-m-v").textContent=m+"%";
      document.getElementById("dp-t-v").textContent=t.toFixed(1)+"次";
      document.getElementById("dp-l-v").textContent=l.toFixed(1)+"倍";
      const roe=m*t*l;
      document.getElementById("dp-out").textContent=roe.toFixed(1)+"%";
      let note=roe>=20?"顶级水平(如果能持续)。":roe>=15?"优秀。":roe>=8?"中规中矩。":"偏弱。";
      if(l>=4)note+=" ⚠️ 杠杆超过4倍:这个ROE有不小成分是借钱撑出来的,逆风时最脆弱。";
      document.getElementById("dp-note").innerHTML=`${m}% × ${t.toFixed(1)} × ${l.toFixed(1)} = ${roe.toFixed(1)}% — ${note}<br>试试:净利率25×周转0.6×杠杆1.5(苹果型) vs 净利率3×周转3.0×杠杆2.0(Costco型)`;
    };
    ["dp-m","dp-t","dp-l"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="fcf"){
    const upd=()=>{
      const ocf=+document.getElementById("fc-ocf").value||0, cap=+document.getElementById("fc-capex").value||0, mc=+document.getElementById("fc-mcap").value||0;
      const f=ocf-cap;
      document.getElementById("fc-out").textContent=fmt(f);
      const y=mc>0?(f/mc*100).toFixed(1):"—";
      document.getElementById("fc-note").innerHTML=f<0?`⚠️ FCF为负:主业现金不够覆盖投入,要靠存粮或融资过日子。`:`FCF收益率 = ${fmt(f)} ÷ ${fmt(mc)} = <b>${y}%</b>(把整家公司买下来的年现金回报)。和国债收益率(~4%)比一比:明显更高=可能便宜,明显更低=你在为增长预期付钱。`;
    };
    ["fc-ocf","fc-capex","fc-mcap"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="peg"){
    const upd=()=>{
      const pe=+document.getElementById("pg-pe").value||0, g=+document.getElementById("pg-g").value||0;
      const pill=document.getElementById("pg-pill"), out=document.getElementById("pg-out"), note=document.getElementById("pg-note");
      if(g<=0){out.textContent="—";pill.innerHTML='<span class="pill y">不适用</span>';note.textContent="零增长或负增长的公司不适用PEG——它们要用别的尺子(分红、P/B、清算价值)。";return}
      const peg=pe/g;
      out.textContent=peg.toFixed(2);
      pill.innerHTML=peg<=1?'<span class="pill g">🟢 为增长付的价不贵</span>':peg<=2?'<span class="pill y">🟡 合理偏贵</span>':'<span class="pill r">🔴 在为故事付高价</span>';
      note.textContent="提醒:增速要用'未来几年可持续'的预期,不是去年的一次性爆发。";
    };
    ["pg-pe","pg-g"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="pv"){
    const upd=()=>{
      const fv=+document.getElementById("pv-fv").value||0, n=+document.getElementById("pv-n").value, r=+document.getElementById("pv-r").value/100;
      document.getElementById("pv-n-v").textContent=n+" 年";
      document.getElementById("pv-r-v").textContent=(r*100).toFixed(0)+"%";
      const pv=fv/Math.pow(1+r,n);
      document.getElementById("pv-out").textContent="$"+fmt(pv);
      document.getElementById("pv-note").innerHTML=`${n}年后的 $${fmt(fv)},按 ${(r*100).toFixed(0)}% 折现 = 今天的 $${fmt(pv)}(只剩 ${(pv/fv*100).toFixed(0)}%)。时间+折现率,是吃掉未来价值的两只手。`;
    };
    ["pv-fv","pv-n","pv-r"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="dcf"){
    const upd=()=>{
      const f0=+document.getElementById("dc-fcf").value||0;
      const g=+document.getElementById("dc-g").value/100;
      const gt=+document.getElementById("dc-gt").value/100;
      const r=+document.getElementById("dc-r").value/100;
      const mc=+document.getElementById("dc-mcap").value||0;
      document.getElementById("dc-g-v").textContent=(g*100).toFixed(0)+"%";
      document.getElementById("dc-gt-v").textContent=(gt*100).toFixed(1)+"%";
      document.getElementById("dc-r-v").textContent=(r*100).toFixed(1)+"%";
      const out=document.getElementById("dc-out"), ver=document.getElementById("dc-verdict"), note=document.getElementById("dc-note");
      if(r<=gt){out.textContent="—";ver.innerHTML='<span class="pill r">折现率必须大于永续增速</span>';note.textContent="永续公式要求 r > g,否则价值无穷大(显然不现实)。把折现率调高或永续增速调低。";return}
      let sum=0,f=f0;
      for(let t=1;t<=5;t++){f=f*(1+g);sum+=f/Math.pow(1+r,t)}
      const tv=f*(1+gt)/(r-gt);
      sum+=tv/Math.pow(1+r,5);
      out.textContent="$"+fmt(sum);
      if(mc>0){
        const disc=(1-mc/sum)*100;
        if(disc>=30)ver.innerHTML=`<span class="pill g">🟢 市值比估值低 ${disc.toFixed(0)}%:满足七折安全边际</span>`;
        else if(disc>=0)ver.innerHTML=`<span class="pill y">🟡 市值比估值低 ${disc.toFixed(0)}%:接近合理,边际不足</span>`;
        else ver.innerHTML=`<span class="pill r">🔴 市值比估值高 ${(-disc).toFixed(0)}%:按你的假设,偏贵</span>`;
      }else ver.innerHTML="";
      note.innerHTML=`其中"终值"占了估值的一大半——这就是为什么永续增速必须保守。<b>动动滑块:</b>折现率10%→8%,或增速8%→15%,看结论怎么翻天覆地。结论由假设决定,所以假设要保守+留安全边际。`;
    };
    ["dc-fcf","dc-g","dc-gt","dc-r","dc-mcap"].forEach(id=>document.getElementById(id).oninput=upd);upd();
  }
  if(type==="moat"){
    window._mt={done:0,score:0,rows:[
      {n:"可口可乐",a:0},{n:"Visa",a:1},{n:"微软 Office",a:2},{n:"Costco",a:3}],
      moats:["品牌","网络效应","转换成本","成本优势"]};
    const rows=window._mt.rows.map((rw,ri)=>`<div style="margin-bottom:12px"><b style="display:inline-block;min-width:90px">${rw.n}</b><br>${window._mt.moats.map((m,mi)=>`<button class="sortbtn" id="mt-${ri}-${mi}" onclick="mtAns(${ri},${mi})">${m}</button>`).join("")}</div>`).join("");
    document.getElementById("mt-rows").innerHTML=rows;
  }
  if(type==="thesis"){
    const K="stockCourse2Thesis_v1";
    let sv={};try{sv=JSON.parse(localStorage.getItem(K))||{}}catch(e){}
    const ids=["th-name","th-why","th-true","th-sell"];
    ids.forEach(id=>{const el=document.getElementById(id);if(sv[id])el.value=sv[id];
      el.oninput=()=>{sv[id]=el.value;try{localStorage.setItem(K,JSON.stringify(sv))}catch(e){}thUpd();};});
    window.thUpd=()=>{
      const v=id=>document.getElementById(id).value.trim();
      const name=v("th-name"),why=v("th-why"),mt=v("th-true"),sell=v("th-sell");
      document.getElementById("th-out").innerHTML=(why||mt||sell)?
        `<b style="color:#4338ca">📜 ${name||"(公司名)"} 投资论文</b><br><br><b>① 为什么会赢:</b>${why||"<i style='color:#9ca3af'>待填写</i>"}<br><br><b>② 必须保持为真:</b>${mt||"<i style='color:#9ca3af'>待填写</i>"}<br><br><b>③ 卖出信号:</b>${sell||"<i style='color:#9ca3af'>待填写</i>"}<br><br><span style="font-size:13px;color:#6b7280">✅ 已自动保存。暴跌的那天,回来打开它。</span>`
        :"开始填写,你的论文会实时出现在这里 👇";
    };
    thUpd();
  }
  if(type==="toolbox"){
    const K="stockCourse2Toolbox_v1";
    let sv={};try{sv=JSON.parse(localStorage.getItem(K))||{}}catch(e){}
    const items=["我能用一句话讲清这家公司怎么赚钱","利润表:看过近3-5年营收和利润趋势","现金流:经营现金流为正且≥净利润","家底:现金vs债务,三个安全指标过关","ROE:杜邦拆过,知道靠本事还是靠杠杆","股数:近年在回购还是稀释","护城河:四种里至少占一种,说得出证据","行业:天花板/格局/周期三问有答案","估值:跑过DCF或PEG,定了安全边际买入价","论文:三段论文+卖出触发器已写好"];
    document.getElementById("tb-list").innerHTML=items.map((t,i)=>`<label style="display:flex;gap:10px;align-items:flex-start;padding:10px 12px;margin-bottom:8px;background:#fff;border:1px solid var(--line);border-radius:12px;cursor:pointer;font-size:14.5px"><input type="checkbox" data-tb="${i}" style="margin-top:3px;width:18px;height:18px;accent-color:var(--accent2);flex-shrink:0"><span>${t}</span></label>`).join("");
    const boxes=document.querySelectorAll("#tb-list input[type=checkbox]");
    const out=document.getElementById("tb-out");
    const upd=()=>{let n=0;boxes.forEach(b=>{if(b.checked)n++});
      out.innerHTML=`完成 ${n} / ${boxes.length} —— ${n===boxes.length?"🏆 十项全过!这就是你和'凭感觉买'的人之间的差距。":"全部打勾再考虑出手,这就是纪律。"}`;};
    boxes.forEach(b=>{const i=b.getAttribute("data-tb");if(sv[i])b.checked=true;
      b.onchange=()=>{sv[i]=b.checked;try{localStorage.setItem(K,JSON.stringify(sv))}catch(e){}upd();};});
    upd();
  }
  if(type==="earnings"){
    window._er={i:0,score:0,items:[
      {t:"场景1:EPS和营收双双超预期(beat),但管理层把下季度指引下调了10%。",a:1,e:"市场为未来定价:指引改写了未来,'好成绩'救不了'坏前景'——大概率下跌。"},
      {t:"场景2:本季亏损扩大(miss),但公司宣布拿下行业超大订单,并大幅上调全年指引。",a:0,e:"未来被改写得更亮——'坏成绩+好前景'反而常常大涨。"},
      {t:"场景3:EPS小幅beat 2%,指引不变,但股价此前3个月已大涨50%。",a:2,e:"涨多之后,市场的'隐含预期'已远高于官方预期——平庸的beat可能'不够好',难说甚至下跌(英伟达式场景)。"}]};
    erShow();
  }
}

/* cashsort 游戏 */
function csShow(){
  const s=window._cs;
  if(!document.getElementById("cs-q"))return; /* 用户已离开本课 */
  if(s.i>=s.items.length){
    document.getElementById("cs-q").textContent="🎉 全部完成!";
    document.getElementById("cs-btns").innerHTML=`<button class="sortbtn" onclick="csRestart()">🔁 再玩一次</button>`;
    const out=document.getElementById("cs-out");out.style.display="block";
    out.innerHTML=`答对 <b>${s.score} / ${s.items.length}</b>${s.score===s.items.length?" 🏆 满分!三段现金流已经刻进DNA了!":" —— 错的那几题再想想,分类的关键是问:这笔钱和'主业运转/发展投入/找钱还钱'哪个有关?"}`;
    return;
  }
  document.getElementById("cs-q").textContent=`第 ${s.i+1}/${s.items.length} 题:「${s.items[s.i].t}」`;
}
function csRestart(){
  window._cs.i=0;window._cs.score=0;
  document.getElementById("cs-out").style.display="none";
  document.getElementById("cs-btns").innerHTML=`<button class="sortbtn" onclick="csAns(0)">🏪 经营</button><button class="sortbtn" onclick="csAns(1)">🏗️ 投资</button><button class="sortbtn" onclick="csAns(2)">🏦 筹资</button>`;
  csShow();
}
function csAns(k){
  const s=window._cs, it=s.items[s.i];
  const out=document.getElementById("cs-out");out.style.display="block";
  if(k===it.k){s.score++;out.innerHTML=`✅ 对!${it.e}`}
  else{out.innerHTML=`❌ 不对哦。${it.e}`}
  s.i++;
  setTimeout(csShow,1100);
}
/* margin 对比器 */
function mgPick(i){
  const d=window._mg[i];
  document.querySelectorAll("#mg-seg button").forEach((b,bi)=>b.classList.toggle("on",bi===i));
  const mx=80;
  document.getElementById("mg-bars").innerHTML=
    `<div class="bar" style="height:${Math.max(4,d.g/mx*100)}%;background:#8b5cf6"><span>${d.g}%</span></div>
     <div class="bar" style="height:${Math.max(4,d.nn/mx*100)}%;background:#16a34a"><span>${d.nn}%</span></div>`;
  document.getElementById("mg-note").innerHTML=`<b>${d.n}</b>:${d.c}`;
}
/* moat 配对 */
function mtAns(ri,mi){
  const s=window._mt, rw=s.rows[ri];
  if(rw.done)return;
  rw.done=true;s.done++;
  for(let m=0;m<4;m++){
    const b=document.getElementById(`mt-${ri}-${m}`);b.disabled=true;
    if(m===rw.a)b.classList.add("ok");
    if(m===mi&&mi!==rw.a)b.classList.add("no");
  }
  if(mi===rw.a)s.score++;
  if(s.done===s.rows.length){
    const out=document.getElementById("mt-out");out.style.display="block";
    out.innerHTML=`答对 <b>${s.score}/4</b>。${s.score===4?"🏆 全对!":""} 参考答案:可口可乐=品牌,Visa=网络效应,Office=转换成本(全公司的文件和习惯都绑在上面),Costco=成本优势。<br><span style="font-size:13px;color:#6b7280">彩蛋思考:苹果其实同时占了品牌+转换成本+生态网络——顶级公司常常多条护城河叠加。</span>`;
  }
}
/* earnings 模拟器 */
function erShow(){
  const s=window._er;
  if(!document.getElementById("er-q"))return; /* 用户已离开本课 */
  if(s.i>=s.items.length){
    document.getElementById("er-q").textContent="🎉 三个场景全部完成!";
    document.getElementById("er-btns").innerHTML="";
    const out=document.getElementById("er-out");out.style.display="block";
    out.innerHTML=`答对 <b>${s.score}/${s.items.length}</b>。核心只有一句:<b>股价对"预期的变化"反应,而不是对"结果的好坏"反应。</b>恭喜你修完两门课的全部内容 🎓`;
    return;
  }
  document.getElementById("er-q").textContent=s.items[s.i].t;
}
function erAns(k){
  const s=window._er, it=s.items[s.i];
  const out=document.getElementById("er-out");out.style.display="block";
  if(k===it.a){s.score++;out.innerHTML=`✅ 判断正确!${it.e}`}
  else{out.innerHTML=`❌ 市场的反应可能和你想的不同。${it.e}`}
  s.i++;
  setTimeout(erShow,1600);
}

render();
</script>
</body>
</html>
