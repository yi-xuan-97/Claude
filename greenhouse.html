<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>🏡 小温室</title>
<meta name="description" content="私人小花园,闲人免进。" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  :root{--ac:#3F7D4E;--screen:#DCE9DA;--frame:#EFF5EC;--ink:#20321F;--sub:#647D62;--soft:#E3F0E1;--line:#D5E4D1}
  body{background:var(--screen);font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .lockwrap{width:100%;max-width:380px}
  .lockcard{background:#fff;border:1px solid var(--line);border-radius:24px;padding:30px 26px 26px;box-shadow:0 18px 50px rgba(24,50,30,.12);text-align:center}
  .tile{width:74px;height:74px;border-radius:22px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto}
  h1{font:800 24px 'Baloo 2','Noto Sans SC';margin-top:16px}
  .sub{font:500 12.5px 'Noto Sans SC';color:var(--sub);margin-top:5px}
  .pwrow{margin-top:22px;display:flex;flex-direction:column;gap:10px}
  input{width:100%;font:700 16px 'Space Grotesk';color:var(--ink);background:#F7FAF6;border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;outline:none;text-align:center;letter-spacing:.04em}
  input:focus{border-color:var(--ac)}
  button{font:700 15px 'Noto Sans SC';color:#fff;background:var(--ac);border:none;padding:13px;border-radius:13px;cursor:pointer;box-shadow:0 8px 18px rgba(63,125,78,.28);transition:.2s}
  button:disabled{opacity:.65;cursor:default}
  .err{display:none;font:700 12.5px 'Noto Sans SC';color:#B0472E;background:#F9E7E0;border:1px solid #EFCDBF;border-radius:11px;padding:9px;margin-top:12px}
  .opening{display:none;font:700 13.5px 'Noto Sans SC';color:var(--ac);margin-top:20px}
  .hint{font:500 11px 'Noto Sans SC';color:var(--sub);margin-top:16px;opacity:.85}
  .foot{text-align:center;font:500 10.5px 'Space Grotesk';color:var(--sub);margin-top:18px;opacity:.75}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}
</style>
</head>
<body>
<div class="lockwrap">
  <div class="lockcard" id="card">
    <div class="tile">🏡</div>
    <h1>小温室</h1>
    <div class="sub">请输入暗号进门</div>
    <form class="pwrow" id="form">
      <input type="password" id="pw" placeholder="暗号" autocomplete="current-password" autofocus />
      <button type="submit" id="btn">🔓 进门</button>
    </form>
    <div class="opening" id="opening">🌿 开门中…</div>
    <div class="err" id="err">暗号不对哦,再想想 🌿</div>
    <div class="hint">忘记暗号?找 Claude 重新种一遍就好</div>
  </div>
  <div class="foot">🌱 GARDEN SAVE</div>
</div>
<noscript>需要开启 JavaScript 才能进门。</noscript>

      err.style.display='block';err.textContent='暗号不对哦,再想想 🌿';
      card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');
      pw.select();
    }
  });
})();
</script>
